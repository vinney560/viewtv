<!DOCTYPE html>
<html>
<head>
  <title>{{ name }}</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body style="background: #000; color: #fff; text-align: center; padding: 20px;">
  <h2>Now Playing: {{ name }}</h2>
  <video id="video" controls autoplay width="100%" style="max-width: 800px; border-radius: 12px;"></video>

  <script>
    const video = document.getElementById('video');
    const streamUrl = "{{ stream_url }}";

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(streamUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play();
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = streamUrl;
      video.addEventListener('loadedmetadata', function () {
        video.play();
      });
    } else {
      alert("This browser doesn't support playing .m3u8 streams.");
    }
  </script>
</body>
</html>
