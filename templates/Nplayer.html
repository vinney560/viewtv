<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ name }} - Streaming</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-black to-gray-900 text-white min-h-screen flex flex-col items-center p-4">

  <!-- Back / Close Button -->
  <button onclick="tryClose()" 
    class="fixed top-4 left-4 z-50 flex items-center text-cyan-400 hover:text-cyan-300 transition">
    <svg xmlns="http://www.w3.org/2000/svg" 
         fill="none" 
         viewBox="0 0 24 24" 
         stroke-width="2" 
         stroke="currentColor" 
         class="w-2 h-2 mr-1">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
    <span class="font-medium text-base">Back</span>
  </button>

  <!-- Video Player Container -->
  <div class="w-full max-w-5xl mt-20 sm:mt-28 bg-neutral-900 rounded-xl shadow-lg p-4 sm:p-6 border border-cyan-500/20">
    <h1 class="text-center text-xl sm:text-2xl font-semibold text-cyan-300 mb-4">{{ name }}</h1>
    <div class="aspect-video w-full">
      <video 
        controls 
        autoplay 
        class="w-full h-full object-contain rounded-lg bg-black outline-none">
        <source src="{{ stream_url }}" type="application/x-mpegURL">
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

  <script>
    function tryClose() {
      window.close();
      setTimeout(() => {
        if (!window.closed) {
          history.back();
        }
      }, 300);
    }
  </script>
</body>
</html>
