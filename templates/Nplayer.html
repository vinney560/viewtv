<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ name }} - Streaming</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .player-container {
      width: 90%;
      max-width: 900px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
      border-radius: 12px;
      overflow: hidden;
      background-color: #111;
      padding: 10px;
    }

    video {
      width: 100%;
      height: auto;
      border-radius: 8px;
      outline: none;
      background-color: #000;
    }

    .video-title {
      text-align: center;
      font-size: 1.2em;
      margin-bottom: 10px;
      color: #00e1ff;
    }
  </style>
</head>
<body>

  <div class="player-container">
    <div class="video-title">{{ name }}</div>
    <video controls autoplay>
      <source src="{{ stream_url }}" type="application/x-mpegURL">
      Your browser does not support HTML5 video.
    </video>
  </div>

</body>
</html>
