<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ name }} - Streaming</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background-color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      color: #fff;
      padding: 20px 0;
    }

    .back-button {
      align-self: flex-start;
      margin-left: 5%;
      margin-bottom: 15px;
      color: #58a6ff;
      text-decoration: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 18px;
    }

    .back-button svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .player-container {
      width: 90%;
      max-width: 900px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
      border-radius: 12px;
      overflow: hidden;
      background-color: #111;
      padding: 10px;
    }

    video {
      width: 100%;
      height: auto;
      border-radius: 8px;
      outline: none;
      background-color: #000;
    }

    .video-title {
      text-align: center;
      font-size: 1.2em;
      margin-bottom: 10px;
      color: #00e1ff;
    }
  </style>
</head>
<body>

  <!-- Back Button -->
  <a href="javascript:history.back()" class="back-button" title="Go Back" aria-label="Go Back">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" >
      <path d="M19 12H5M12 19l-7-7 7-7" />
    </svg>
    Back
  </a>

  <div class="player-container">
    <div class="video-title">{{ name }}</div>
    <video controls autoplay>
      <source src="{{ stream_url }}" type="application/x-mpegURL">
      Your browser does not support HTML5 video.
    </video>
  </div>

</body>
</html>
