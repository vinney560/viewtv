<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Media Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #ff3e5f;
      --secondary: #2d2f3b;
      --accent: #4a8cff;
      --dark: #1a1c24;
      --light: #f5f7fa;
      --overlay: rgba(0, 0, 0, 0.75);
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1a1c24, #2d2f3b);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .player-container {
      width: 100%;
      max-width: 1000px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      position: relative;
      background: var(--dark);
    }

    .video-container {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      outline: none;
    }

    /* Loading spinner */
    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      z-index: 10;
      display: none;
    }

    .spinner {
      width: 100%;
      height: 100%;
      border: 5px solid rgba(255, 255, 255, 0.1);
      border-top: 5px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Buffering indicator */
    .buffering {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--overlay);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      display: none;
      z-index: 9;
    }

    /* Controls container */
    .controls-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 15px;
      background: linear-gradient(transparent, var(--overlay));
      transition: var(--transition);
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .controls-container.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Progress bar */
    .progress-container {
      width: 100%;
      height: 6px;
      cursor: pointer;
      position: relative;
      margin-bottom: 5px;
    }

    .progress-bar {
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      background: var(--primary);
      width: 0%;
      position: relative;
      transition: width 0.1s linear;
    }

    .buffer {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: rgba(255, 255, 255, 0.3);
      width: 0%;
    }

    .hover-time {
      position: absolute;
      bottom: 15px;
      height: 30px;
      background: var(--overlay);
      border-radius: 4px;
      padding: 0 10px;
      font-size: 12px;
      line-height: 30px;
      pointer-events: none;
      display: none;
    }

    /* Time display */
    .time-display {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 5px;
    }

    /* Controls */
    .controls-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .left-controls, .right-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Control buttons */
    .control-btn {
      background: transparent;
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      font-size: 18px;
      position: relative;
    }

    .control-btn:hover, .control-btn:active {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.1);
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    .control-btn i {
      pointer-events: none;
    }

    /* Volume controls */
    .volume-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .volume-slider {
      width: 80px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      opacity: 0;
      transition: var(--transition);
    }

    .volume-container:hover .volume-slider {
      opacity: 1;
      width: 100px;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
    }

    /* Playback rate */
    .playback-rate {
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition);
    }

    .playback-rate:hover {
      background: rgba(0, 0, 0, 0.7);
    }

    /* Settings menus */
    .menu {
      position: absolute;
      bottom: 70px;
      background: var(--overlay);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      overflow: hidden;
      display: none;
      z-index: 30;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      min-width: 180px;
    }

    .quality-menu {
      right: 10px;
    }

    .settings-menu {
      right: 60px;
    }

    .menu-item {
      padding: 12px 20px;
      color: white;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: var(--transition);
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .menu-item i {
      width: 20px;
      text-align: center;
    }

    /* Error message */
    .error-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--overlay);
      padding: 25px;
      border-radius: 16px;
      max-width: 80%;
      text-align: center;
      display: none;
      z-index: 40;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .error-message h3 {
      color: var(--primary);
      margin-bottom: 15px;
    }

    .reload-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 30px;
      margin-top: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: var(--transition);
    }

    .reload-btn:hover {
      background: #ff2a4e;
      transform: translateY(-2px);
    }

    /* New features styling */
    .stats-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--overlay);
      padding: 15px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
      z-index: 15;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .theater-mode {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 15;
    }

    .theater-btn {
      background: var(--overlay);
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(10px);
    }

    .speed-indicator {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--overlay);
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 14px;
      display: none;
      z-index: 15;
      backdrop-filter: blur(10px);
    }

    .screenshot-effect {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0;
      z-index: 100;
      pointer-events: none;
    }

    /* Mobile optimizations */
    @media (max-width: 768px) {
      .control-btn {
        width: 44px;
        height: 44px;
        font-size: 20px;
      }
      
      .volume-slider {
        display: none;
      }
      
      .menu {
        min-width: 160px;
        font-size: 15px;
      }
      
      .time-display {
        font-size: 13px;
      }
      
      .theater-btn {
        padding: 6px 12px;
        font-size: 13px;
      }
    }

    /* Touch optimizations */
    .touch-controls .control-btn {
      width: 50px;
      height: 50px;
      font-size: 22px;
    }
    
    .touch-controls .playback-rate {
      padding: 8px 15px;
      font-size: 16px;
    }

    /* Theater mode styling */
    .theater-mode-active .player-container {
      max-width: 100%;
      border-radius: 0;
    }
    
    .theater-mode-active .video-container {
      padding-top: 0;
      height: calc(100vh - 100px);
    }
    
    .theater-mode-active body {
      padding: 0;
    }

    /* Screenshot notification */
    .screenshot-notification {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--overlay);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      display: none;
      z-index: 25;
      backdrop-filter: blur(10px);
    }

    /* Stats button badge */
    .stats-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: var(--primary);
      color: white;
      font-size: 10px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="player-container">
    <div class="video-container">
      <video id="video" playsinline></video>
      
      <!-- Loading spinner -->
      <div class="loader">
        <div class="spinner"></div>
      </div>
      
      <!-- Buffering indicator -->
      <div class="buffering">Buffering...</div>
      
      <!-- Theater mode button -->
      <div class="theater-mode">
        <button class="theater-btn" id="theater-btn">
          <i class="fas fa-theater-masks"></i> Theater Mode
        </button>
      </div>
      
      <!-- Speed indicator -->
      <div class="speed-indicator" id="speed-indicator">1.0x</div>
      
      <!-- Stats panel -->
      <div class="stats-panel" id="stats-panel">
        <div><strong>Resolution:</strong> <span id="stats-resolution">1920x1080</span></div>
        <div><strong>Bitrate:</strong> <span id="stats-bitrate">4.5 Mbps</span></div>
        <div><strong>FPS:</strong> <span id="stats-fps">30</span></div>
        <div><strong>Buffer:</strong> <span id="stats-buffer">10s</span></div>
        <div><strong>Codecs:</strong> <span id="stats-codecs">H.264, AAC</span></div>
      </div>
      
      <!-- Screenshot effect -->
      <div class="screenshot-effect" id="screenshot-effect"></div>
      
      <!-- Screenshot notification -->
      <div class="screenshot-notification" id="screenshot-notification">
        <i class="fas fa-camera"></i> Screenshot saved!
      </div>
      
      <!-- Controls container -->
      <div class="controls-container" id="controls-container">
        <!-- Progress bar -->
        <div class="progress-container" id="progress-container">
          <div class="progress-bar" id="progress-bar">
            <div class="buffer" id="buffer"></div>
            <div class="progress" id="progress"></div>
          </div>
          <div class="hover-time" id="hover-time"></div>
        </div>
        
        <!-- Time display -->
        <div class="time-display">
          <span id="current-time">00:00</span>
          <span id="duration">00:00</span>
        </div>
        
        <!-- Controls row -->
        <div class="controls-row">
          <div class="left-controls">
            <!-- Play/Pause -->
            <button class="control-btn" id="play-btn" title="Play/Pause">
              <i class="fas fa-play" id="play-icon"></i>
              <i class="fas fa-pause" id="pause-icon" style="display:none;"></i>
            </button>
            
            <!-- Volume -->
            <div class="volume-container">
              <button class="control-btn" id="mute-btn" title="Mute">
                <i class="fas fa-volume-high" id="volume-high"></i>
                <i class="fas fa-volume-low" id="volume-low" style="display:none;"></i>
                <i class="fas fa-volume-xmark" id="volume-mute" style="display:none;"></i>
              </button>
              <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01" value="1">
            </div>
            
            <!-- Time display -->
            <span class="time-text" id="time-text">00:00 / 00:00</span>
          </div>
          
          <div class="right-controls">
            <!-- PiP -->
            <button class="control-btn" id="pip-btn" title="Picture-in-Picture">
              <i class="fas fa-clone"></i>
            </button>
            
            <!-- Screenshot -->
            <button class="control-btn" id="screenshot-btn" title="Take Screenshot">
              <i class="fas fa-camera"></i>
            </button>
            
            <!-- Playback rate -->
            <select class="playback-rate" id="playback-rate" title="Playback Speed">
              <option value="0.5">0.5x</option>
              <option value="0.75">0.75x</option>
              <option value="1" selected>1x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2x</option>
            </select>
            
            <!-- Stats -->
            <button class="control-btn" id="stats-btn" title="Statistics">
              <i class="fas fa-chart-simple"></i>
              <span class="stats-badge" id="stats-badge">ON</span>
            </button>
            
            <!-- Settings -->
            <button class="control-btn" id="settings-btn" title="Settings">
              <i class="fas fa-gear"></i>
            </button>
            
            <!-- Fullscreen -->
            <button class="control-btn" id="fullscreen-btn" title="Fullscreen">
              <i class="fas fa-expand" id="fullscreen-enter"></i>
              <i class="fas fa-compress" id="fullscreen-exit" style="display:none;"></i>
            </button>
          </div>
        </div>
      </div>
      
      <!-- Quality Menu -->
      <div class="menu quality-menu" id="quality-menu">
        <div class="menu-item">
          <i class="fas fa-bolt"></i>
          <span>Auto Quality</span>
        </div>
        <div class="menu-item">
          <i class="fas fa-hd"></i>
          <span>1080p (Full HD)</span>
        </div>
        <div class="menu-item">
          <i class="fas fa-tv"></i>
          <span>720p (HD)</span>
        </div>
        <div class="menu-item">
          <i class="fas fa-mobile"></i>
          <span>480p (SD)</span>
        </div>
      </div>
      
      <!-- Settings Menu -->
      <div class="menu settings-menu" id="settings-menu">
        <div class="menu-item" id="quality-option">
          <i class="fas fa-gauge-high"></i>
          <span>Quality Settings</span>
        </div>
        <div class="menu-item" id="subtitle-option">
          <i class="fas fa-closed-captioning"></i>
          <span>Subtitles</span>
        </div>
        <div class="menu-item" id="audio-option">
          <i class="fas fa-language"></i>
          <span>Audio Track</span>
        </div>
      </div>
      
      <!-- Error message -->
      <div class="error-message" id="error-message">
        <h3>Playback Error</h3>
        <p id="error-text">An error occurred while trying to play the video.</p>
        <button class="reload-btn" id="reload-btn">Reload Player</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // DOM Elements
      const video = document.getElementById('video');
      const container = document.querySelector('.player-container');
      const loader = document.querySelector('.loader');
      const buffering = document.querySelector('.buffering');
      const controlsContainer = document.getElementById('controls-container');
      const progressContainer = document.getElementById('progress-container');
      const progressBar = document.getElementById('progress-bar');
      const progress = document.getElementById('progress');
      const buffer = document.getElementById('buffer');
      const hoverTime = document.getElementById('hover-time');
      const currentTimeDisplay = document.getElementById('current-time');
      const durationDisplay = document.getElementById('duration');
      const timeText = document.getElementById('time-text');
      const playBtn = document.getElementById('play-btn');
      const playIcon = document.getElementById('play-icon');
      const pauseIcon = document.getElementById('pause-icon');
      const muteBtn = document.getElementById('mute-btn');
      const volumeHigh = document.getElementById('volume-high');
      const volumeLow = document.getElementById('volume-low');
      const volumeMute = document.getElementById('volume-mute');
      const volumeSlider = document.getElementById('volume-slider');
      const playbackRate = document.getElementById('playback-rate');
      const pipBtn = document.getElementById('pip-btn');
      const screenshotBtn = document.getElementById('screenshot-btn');
      const statsBtn = document.getElementById('stats-btn');
      const statsBadge = document.getElementById('stats-badge');
      const settingsBtn = document.getElementById('settings-btn');
      const fullscreenBtn = document.getElementById('fullscreen-btn');
      const fullscreenEnter = document.getElementById('fullscreen-enter');
      const fullscreenExit = document.getElementById('fullscreen-exit');
      const qualityMenu = document.getElementById('quality-menu');
      const settingsMenu = document.getElementById('settings-menu');
      const qualityOption = document.getElementById('quality-option');
      const errorMessage = document.getElementById('error-message');
      const errorText = document.getElementById('error-text');
      const reloadBtn = document.getElementById('reload-btn');
      const theaterBtn = document.getElementById('theater-btn');
      const statsPanel = document.getElementById('stats-panel');
      const speedIndicator = document.getElementById('speed-indicator');
      const screenshotEffect = document.getElementById('screenshot-effect');
      const screenshotNotification = document.getElementById('screenshot-notification');

      // Variables
      let hls;
      let controlsTimeout;
      let isSeeking = false;
      let isQualityMenuOpen = false;
      let isSettingsMenuOpen = false;
      let isStatsVisible = false;
      let isTheaterMode = false;
      let streamURL = "{{ stream_url }}"";
      let isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

      // Add touch class if touch device
      if (isTouchDevice) {
        document.body.classList.add('touch-controls');
      }

      // Initialize player
      initPlayer();

      function initPlayer() {
        // Initialize HLS.js
        if (Hls.isSupported()) {
          hls = new Hls({
            maxBufferLength: 15,
            maxMaxBufferLength: 30,
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 10
          });
          
          hls.on(Hls.Events.MEDIA_ATTACHED, function() {
            console.log('Video and HLS.js are now bound together');
            hls.loadSource(streamURL);
          });
          
          hls.on(Hls.Events.MANIFEST_PARSED, function(event, data) {
            console.log('Manifest loaded, found ' + data.levels.length + ' quality levels');
            hideLoader();
            video.play().catch(e => showError('Autoplay was prevented: ' + e.message));
          });
          
          hls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
              switch(data.type) {
                case Hls.ErrorTypes.NETWORK_ERROR:
                  showError('Network error: ' + data.details);
                  break;
                case Hls.ErrorTypes.MEDIA_ERROR:
                  showError('Media error: ' + data.details);
                  break;
                default:
                  showError('Fatal error: ' + data.details);
                  break;
              }
            }
          });
          
          hls.attachMedia(video);
        } 
        // Fallback to native HLS support
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = streamURL;
          video.addEventListener('loadedmetadata', function() {
            hideLoader();
            video.play().catch(e => showError('Autoplay was prevented: ' + e.message));
          });
        } 
        // No HLS support
        else {
          showError('HLS is not supported in your browser');
        }

        // Event listeners
        setupEventListeners();
      }

      function setupEventListeners() {
        // Video events
        video.addEventListener('play', onPlay);
        video.addEventListener('pause', onPause);
        video.addEventListener('timeupdate', updateProgress);
        video.addEventListener('durationchange', updateDuration);
        video.addEventListener('volumechange', updateVolumeUI);
        video.addEventListener('waiting', onWaiting);
        video.addEventListener('playing', onPlaying);
        video.addEventListener('seeking', onSeekingStart);
        video.addEventListener('seeked', onSeekingEnd);
        video.addEventListener('error', onVideoError);
        video.addEventListener('enterpictureinpicture', onEnterPIP);
        video.addEventListener('leavepictureinpicture', onLeavePIP);
        video.addEventListener('ratechange', onRateChange);

        // Control buttons
        playBtn.addEventListener('click', togglePlay);
        muteBtn.addEventListener('click', toggleMute);
        volumeSlider.addEventListener('input', changeVolume);
        playbackRate.addEventListener('change', changePlaybackRate);
        pipBtn.addEventListener('click', togglePIP);
        screenshotBtn.addEventListener('click', takeScreenshot);
        statsBtn.addEventListener('click', toggleStats);
        settingsBtn.addEventListener('click', toggleSettingsMenu);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        theaterBtn.addEventListener('click', toggleTheaterMode);
        reloadBtn.addEventListener('click', reloadPlayer);

        // UI interactions
        container.addEventListener('mousemove', showControls);
        container.addEventListener('mouseleave', hideControls);
        container.addEventListener('click', toggleControls);
        progressContainer.addEventListener('click', seek);
        progressContainer.addEventListener('mousemove', updateHoverTime);
        progressContainer.addEventListener('mouseleave', hideHoverTime);
        qualityOption.addEventListener('click', toggleQualityMenu);

        // Touch events
        if (isTouchDevice) {
          container.addEventListener('touchstart', handleTouchStart);
          container.addEventListener('touchend', handleTouchEnd);
          container.addEventListener('touchmove', showControls);
          progressContainer.addEventListener('touchstart', startTouchSeek);
          progressContainer.addEventListener('touchmove', touchSeek);
          progressContainer.addEventListener('touchend', endTouchSeek);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', handleKeyboardShortcuts);
      }

      // Player functions
      function togglePlay() {
        if (video.paused) {
          video.play().catch(e => showError('Playback error: ' + e.message));
        } else {
          video.pause();
        }
      }

      function toggleMute() {
        video.muted = !video.muted;
      }

      function changeVolume() {
        video.volume = volumeSlider.value;
        video.muted = false;
      }

      function changePlaybackRate() {
        video.playbackRate = playbackRate.value;
      }

      function togglePIP() {
        if (document.pictureInPictureElement) {
          document.exitPictureInPicture();
        } else if (document.pictureInPictureEnabled) {
          video.requestPictureInPicture();
        }
      }

      function takeScreenshot() {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Create download link
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = 'screenshot-' + new Date().getTime() + '.png';
        link.click();
        
        // Show visual feedback
        screenshotEffect.style.opacity = '0.8';
        screenshotNotification.style.display = 'block';
        
        setTimeout(() => {
          screenshotEffect.style.opacity = '0';
        }, 100);
        
        setTimeout(() => {
          screenshotNotification.style.display = 'none';
        }, 3000);
      }

      function toggleStats() {
        isStatsVisible = !isStatsVisible;
        statsPanel.style.display = isStatsVisible ? 'block' : 'none';
        statsBadge.textContent = isStatsVisible ? 'ON' : 'OFF';
        
        // Update stats if visible
        if (isStatsVisible) {
          updateStats();
        }
      }

      function toggleTheaterMode() {
        isTheaterMode = !isTheaterMode;
        document.body.classList.toggle('theater-mode-active', isTheaterMode);
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          container.requestFullscreen().catch(err => {
            console.error(`Error attempting to enable fullscreen: ${err.message}`);
          });
        } else {
          document.exitFullscreen();
        }
      }

      function toggleQualityMenu() {
        isQualityMenuOpen = !isQualityMenuOpen;
        qualityMenu.style.display = isQualityMenuOpen ? 'block' : 'none';
        settingsMenu.style.display = 'none';
        isSettingsMenuOpen = false;
      }

      function toggleSettingsMenu() {
        isSettingsMenuOpen = !isSettingsMenuOpen;
        settingsMenu.style.display = isSettingsMenuOpen ? 'block' : 'none';
        qualityMenu.style.display = 'none';
        isQualityMenuOpen = false;
      }

      function seek(e) {
        if (!video.duration) return;
        
        const rect = progressBar.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        video.currentTime = pos * video.duration;
      }

      // Touch handlers
      function handleTouchStart() {
        showControls();
        clearTimeout(controlsTimeout);
      }

      function handleTouchEnd() {
        controlsTimeout = setTimeout(hideControls, 3000);
      }

      function startTouchSeek(e) {
        isSeeking = true;
        showControls();
        clearTimeout(controlsTimeout);
        touchSeek(e);
      }

      function touchSeek(e) {
        if (!isSeeking || !video.duration) return;
        
        const touch = e.touches[0];
        const rect = progressBar.getBoundingClientRect();
        const pos = (touch.clientX - rect.left) / rect.width;
        video.currentTime = pos * video.duration;
      }

      function endTouchSeek() {
        isSeeking = false;
        controlsTimeout = setTimeout(hideControls, 3000);
      }

      function updateHoverTime(e) {
        if (!video.duration) return;
        
        const rect = progressBar.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        const time = pos * video.duration;
        
        hoverTime.style.display = 'block';
        hoverTime.style.left = `${e.clientX - rect.left}px`;
        hoverTime.textContent = formatTime(time);
      }

      function hideHoverTime() {
        hoverTime.style.display = 'none';
      }

      function showLoader() {
        loader.style.display = 'block';
      }

      function hideLoader() {
        loader.style.display = 'none';
      }

      function showBuffering() {
        buffering.style.display = 'block';
      }

      function hideBuffering() {
        buffering.style.display = 'none';
      }

      function showControls() {
        controlsContainer.classList.remove('hidden');
        clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(hideControls, 3000);
      }

      function hideControls() {
        if (!video.paused && !isSeeking) {
          controlsContainer.classList.add('hidden');
        }
      }

      function toggleControls() {
        if (controlsContainer.classList.contains('hidden')) {
          showControls();
        } else {
          hideControls();
        }
      }

      function showError(message) {
        errorText.textContent = message;
        errorMessage.style.display = 'block';
        hideLoader();
        hideBuffering();
      }

      function hideError() {
        errorMessage.style.display = 'none';
      }

      function reloadPlayer() {
        hideError();
        showLoader();
        
        if (hls) {
          hls.destroy();
          initPlayer();
        } else {
          video.load();
          video.play().catch(e => showError('Playback error: ' + e.message));
        }
      }

      function formatTime(seconds) {
        const minutes = Math.floor(seconds / 60);
        seconds = Math.floor(seconds % 60);
        return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
      }

      // Event handlers
      function onPlay() {
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
        showControls();
      }

      function onPause() {
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
      }

      function onWaiting() {
        showBuffering();
      }

      function onPlaying() {
        hideBuffering();
      }

      function onSeekingStart() {
        isSeeking = true;
        showBuffering();
      }

      function onSeekingEnd() {
        isSeeking = false;
        hideBuffering();
      }

      function onVideoError() {
        showError('Video error: ' + video.error.message);
      }

      function onEnterPIP() {
        console.log('Entered Picture-in-Picture');
      }

      function onLeavePIP() {
        console.log('Left Picture-in-Picture');
      }

      function onRateChange() {
        speedIndicator.textContent = video.playbackRate.toFixed(1) + 'x';
        speedIndicator.style.display = 'block';
        setTimeout(() => {
          speedIndicator.style.display = 'none';
        }, 2000);
      }

      function updateProgress() {
        if (!video.duration || isSeeking) return;
        
        const percent = (video.currentTime / video.duration) * 100;
        progress.style.width = percent + '%';
        
        currentTimeDisplay.textContent = formatTime(video.currentTime);
        durationDisplay.textContent = formatTime(video.duration);
        timeText.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
        
        // Update buffered progress
        if (video.buffered.length > 0) {
          const bufferedEnd = video.buffered.end(video.buffered.length - 1);
          const bufferedPercent = (bufferedEnd / video.duration) * 100;
          buffer.style.width = bufferedPercent + '%';
        }
      }

      function updateDuration() {
        durationDisplay.textContent = formatTime(video.duration);
        timeText.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
      }

      function updateVolumeUI() {
        volumeSlider.value = video.volume;
        
        if (video.muted || video.volume === 0) {
          volumeHigh.style.display = 'none';
          volumeLow.style.display = 'none';
          volumeMute.style.display = 'block';
          volumeSlider.value = 0;
        } else if (video.volume < 0.5) {
          volumeHigh.style.display = 'none';
          volumeLow.style.display = 'block';
          volumeMute.style.display = 'none';
        } else {
          volumeHigh.style.display = 'block';
          volumeLow.style.display = 'none';
          volumeMute.style.display = 'none';
        }
      }

      function updateStats() {
        if (!isStatsVisible) return;
        
        // Simulate stats - in a real player you would get these from HLS.js
        document.getElementById('stats-resolution').textContent = 
          video.videoWidth + 'x' + video.videoHeight;
        document.getElementById('stats-bitrate').textContent = 
          (Math.random() * 2 + 3).toFixed(1) + ' Mbps';
        document.getElementById('stats-fps').textContent = 
          Math.round(video.getVideoPlaybackQuality().totalVideoFrames / 10) * 10;
        document.getElementById('stats-buffer').textContent = 
          (Math.random() * 5 + 5).toFixed(1) + 's';
      }

      function handleKeyboardShortcuts(e) {
        // Don't trigger if focused on input elements
        if (['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) return;
        
        switch(e.key.toLowerCase()) {
          case ' ':
          case 'k':
            e.preventDefault();
            togglePlay();
            break;
          case 'm':
            e.preventDefault();
            toggleMute();
            break;
          case 'f':
            e.preventDefault();
            toggleFullscreen();
            break;
          case 't':
            e.preventDefault();
            toggleTheaterMode();
            break;
          case 'arrowright':
            e.preventDefault();
            video.currentTime = Math.min(video.currentTime + 5, video.duration);
            break;
          case 'arrowleft':
            e.preventDefault();
            video.currentTime = Math.max(video.currentTime - 5, 0);
            break;
          case 'l':
            e.preventDefault();
            video.currentTime = Math.min(video.currentTime + 10, video.duration);
            break;
          case 'j':
            e.preventDefault();
            video.currentTime = Math.max(video.currentTime - 10, 0);
            break;
          case 'arrowup':
            e.preventDefault();
            video.volume = Math.min(video.volume + 0.1, 1);
            video.muted = false;
            break;
          case 'arrowdown':
            e.preventDefault();
            video.volume = Math.max(video.volume - 0.1, 0);
            if (video.volume === 0) video.muted = true;
            break;
          case '>':
            if (e.shiftKey) {
              e.preventDefault();
              const rates = Array.from(playbackRate.options).map(opt => parseFloat(opt.value));
              const currentIndex = rates.indexOf(video.playbackRate);
              if (currentIndex < rates.length - 1) {
                video.playbackRate = rates[currentIndex + 1];
                playbackRate.value = video.playbackRate;
              }
            }
            break;
          case '<':
            if (e.shiftKey) {
              e.preventDefault();
              const rates = Array.from(playbackRate.options).map(opt => parseFloat(opt.value));
              const currentIndex = rates.indexOf(video.playbackRate);
              if (currentIndex > 0) {
                video.playbackRate = rates[currentIndex - 1];
                playbackRate.value = video.playbackRate;
              }
            }
            break;
          case 's':
            e.preventDefault();
            takeScreenshot();
            break;
          case 'i':
            e.preventDefault();
            toggleStats();
            break;
        }
      }

      // Initialize volume UI
      updateVolumeUI();
    });
  </script>
</body>
</html>
