<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">
  <a href="javascript:history.back()" 
     class="fixed top-4 left-4 flex items-center text-blue-400 hover:text-blue-300 transition duration-200 z-50">
    <svg xmlns="http://www.w3.org/2000/svg" 
         fill="none" 
         viewBox="0 0 24 24" 
         stroke-width="2" 
         stroke="currentColor" 
         class="w-6 h-6 mr-1">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
    <span class="text-base font-medium">Back</span>
  </a>
  <div class="max-w-4xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6 text-center text-indigo-400">Browse Our Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- Countries -->
      <a href="/countries" class="bg-gray-800 hover:bg-indigo-600 transition-all rounded-2xl shadow-lg p-8 flex flex-col items-center">
        <svg class="w-12 h-12 mb-4 text-indigo-400" fill="none" stroke="currentColor" stroke-width="1.5"
             viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M3.98 8.223A9 9 0 1121 12h-9l-2 5-2-5H3.98z" />
        </svg>
        <span class="text-lg font-semibold">Countries</span>
      </a>

      <!-- Categories -->
      <a href="/categories" class="bg-gray-800 hover:bg-indigo-600 transition-all rounded-2xl shadow-lg p-6 flex flex-col items-center">
        <svg class="w-12 h-12 mb-4 text-indigo-400" fill="none" stroke="currentColor" stroke-width="1.5"
             viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M4 6h16M4 12h16M4 18h16" />
        </svg>
        <span class="text-lg font-semibold">Categories</span>
      </a>

      <!-- Custom Channels -->
      <a href="/custom-list" class="bg-gray-800 hover:bg-indigo-600 transition-all rounded-2xl shadow-lg p-6 flex flex-col items-center">
        <svg class="w-12 h-12 mb-4 text-indigo-400" fill="none" stroke="currentColor" stroke-width="1.5"
             viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 4v16m8-8H4" />
        </svg>
        <span class="text-lg font-semibold">Custom Channels</span>
      </a>
            <a href="/more-channels" class="bg-gray-800 hover:bg-indigo-600 transition-all rounded-2xl shadow-lg p-6 flex flex-col items-center">
        <svg class="w-12 h-12 mb-4 text-indigo-400" fill="none" stroke="currentColor" stroke-width="1.5"
             viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 4v16m8-8H4" />
        </svg>
        <span class="text-lg font-semibold">More...</span>
      </a>
    </div>
  </div>

</body>
</html>
