<!-- templates/channels.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ViewTV Channels</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

    body {
      background: #0a0f1c;
      color: #e0e8ff;
      font-family: 'Orbitron', sans-serif;
      margin: 0;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h2 {
      font-size: 2.2rem;
      color: #6f9dff;
      text-shadow: 0 0 12px #6f9dff99;
      margin-bottom: 40px;
    }

    .channel-list {
      width: 100%;
      max-width: 650px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .channel {
      background: #111827;
      border-radius: 14px;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 0 12px #1f293799;
      transition: all 0.3s ease;
      position: relative;
    }

    .channel:hover {
      background: linear-gradient(135deg, #202c44, #1e1b2b);
      box-shadow: 0 0 20px #6f9dffcc, 0 0 8px #da44ff88;
      transform: translateY(-2px);
    }

    .channel-number {
      font-weight: bold;
      color: #00ffe7;
      margin-right: 10px;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .channel-name {
      flex-grow: 1;
      font-size: 1.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .watch-link {
      background: linear-gradient(90deg, #00ffe7, #8f00ff);
      color: #0a0f1c;
      font-weight: bold;
      padding: 9px 18px;
      border-radius: 9999px;
      text-decoration: none;
      transition: 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 0 10px #00ffe799;
    }

    .watch-link:hover {
      box-shadow: 0 0 16px #00ffe7, 0 0 12px #8f00ff;
      transform: scale(1.05);
      color: white;
    }

    .watch-link::before {
      content: "▶";
      font-size: 1.2rem;
    }

    p.no-channels {
      font-style: italic;
      color: #9ca3af;
      text-align: center;
      margin-top: 60px;
    }

    /* Back button and search */
    .top-controls {
      width: 100%;
      max-width: 650px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 25px;
    }

    .top-controls a {
      color: #6f9dff;
      transition: color 0.3s;
    }

    .top-controls a:hover {
      color: #00ffe7;
    }

    #search {
      flex-grow: 1;
      padding: 10px 14px;
      border-radius: 10px;
      background: #1a2233;
      color: #e0e8ff;
      border: 1px solid #333c52;
      outline: none;
      transition: border 0.3s ease;
    }

    #search:focus {
      border-color: #6f9dff;
      box-shadow: 0 0 8px #6f9dff88;
    }

    @media (max-width: 640px) {
      .channel {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .watch-link {
        width: 100%;
        justify-content: center;
      }

      .top-controls {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <h2>🌐 Available Channels</h2>

  <div class="top-controls">
    <a href="javascript:history.back()" title="Go Back">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-left">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
    </a>

    <input type="text" id="search" placeholder="Search channels..." />
  </div>

  <div class="channel-list">
    {% for ch in channels %}
      <div class="channel" tabindex="0" aria-label="Channel {{ loop.index }}: {{ ch.name }}">
        <div class="channel-number">{{ loop.index }}.</div>
        <div class="channel-name" title="{{ ch.name }}">{{ ch.name }}</div>
        <a class="watch-link" href="{{ url_for('watch') }}?name={{ ch.name }}&url={{ ch.url }}">Watch</a>
      </div>
    {% else %}
      <p class="no-channels">No channels found.</p>
    {% endfor %}
  </div>

  <script>
    const searchInput = document.getElementById("search");
    searchInput.addEventListener("input", () => {
      const query = searchInput.value.toLowerCase();
      const channels = document.querySelectorAll(".channel");
      channels.forEach((channel) => {
        const name = channel.querySelector(".channel-name").textContent.toLowerCase();
        channel.style.display = name.includes(query) ? "flex" : "none";
      });
    });
  </script>
</body>
</html>
