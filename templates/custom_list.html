<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Channels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at center, #0f172a 0%, #020617 100%);
        }
        .channel-card {
            transition: all 0.3s ease;
            transform-style: preserve-3d;
        }
        .channel-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(34, 211, 238, 0.2);
        }
        .search-box:focus {
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.3);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-10 bg-gray-900/80 backdrop-blur-md border-b border-cyan-900/20">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-2">
                <i class="fas fa-tv text-cyan-400 text-2xl"></i>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
                    ViewTv | StreamTv
                </h1>
            </div>
            <div class="relative w-full md:w-64">
                <input type="text" id="searchInput" placeholder="Search channels..." 
                    class="search-box w-full bg-gray-800/80 border border-cyan-900/30 rounded-lg py-2 pl-10 pr-4 
                    text-sm focus:outline-none focus:border-cyan-400 transition-all duration-200">
                <i class="fas fa-search absolute left-3 top-2.5 text-cyan-900/60"></i>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4" id="channelGrid">
            {% for channel in channels %}
            <div class="channel-card bg-gray-800/50 rounded-xl overflow-hidden border border-gray-700/50 hover:border-cyan-400/30">
                <a href="{{ url_for('player') }}?{{ {'url': channel.url, 'token': channel.token}|urlencode }}" target="_blank" class="block">
                    <div class="relative pt-[56.25%] bg-gray-900/30">
                        {% if channel.logo %}
                        <img src="{{ channel.logo }}" alt="{{ channel.name }}" 
                             class="absolute inset-0 w-full h-full object-contain p-4">
                        {% else %}
                        <div class="absolute inset-0 flex items-center justify-center text-cyan-400/30">
                            <i class="fas fa-tv text-5xl"></i>
                        </div>
                        {% endif %}
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-2">
                            <span class="text-xs font-medium text-cyan-400">
                                {{ channel.access or 'free' }}
                            </span>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold text-sm truncate">{{ channel.name }}</h3>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900/50 border-t border-cyan-900/20 py-6">
        <div class="container mx-auto px-4 text-center text-gray-400 text-sm">
            <p>© 2025 ViewTv | StreamTV • All channels are provided for streaming <span class='text-red-600'>ONLY</span>.</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function () {
            const searchTerm = this.value.toLowerCase();
            const cards = document.querySelectorAll('.channel-card');

            cards.forEach(card => {
                const name = card.querySelector('h3').textContent.toLowerCase();
                if (name.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        // Z-index hover effect
        document.querySelectorAll('.channel-card').forEach(card => {
            card.addEventListener('mouseenter', () => card.style.zIndex = '10');
            card.addEventListener('mouseleave', () => card.style.zIndex = '1');
        });
    </script>
</body>
</html>
