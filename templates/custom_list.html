<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Local & Kids Channels</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      margin: 0; padding: 20px; 
      font-family: Arial, sans-serif; 
      background: #0d1117; color: #c9d1d9;
    }
    h2 { color: #58a6ff; margin-bottom: 20px; }
    .list { max-width: 600px; margin: 0 auto; }
    .item {
      background: #161b22; margin-bottom: 12px; padding: 14px 20px; 
      border-radius: 8px; transition: background 0.2s; 
    }
    .item:hover { background: #238636; }
    a { text-decoration: none; color: #00ff88; font-weight: 600; }
  </style>
</head>
<body>
  <a href="javascript:history.back()" 
     class="fixed top-4 left-4 flex items-center text-blue-400 hover:text-blue-300 transition duration-200 z-50">
    <svg xmlns="http://www.w3.org/2000/svg" 
         fill="none" 
         viewBox="0 0 24 24" 
         stroke-width="2" 
         stroke="currentColor" 
         class="w-6 h-6 mr-1">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
    <span class="text-base font-medium">Back</span>
  </a>
  <h2>Local, Sports & Kids Channels</h2>
  <div class="list">
    {% for key, info in channels.items() %}
      <div class="item">
        <a href="{{ url_for('play_channel', key=key) }}">{{ info.name }}</a>
      </div>
    {% endfor %}
  </div>
</body>
</html>
