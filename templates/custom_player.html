<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <title>{{ name }} - Streaming</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    #bufferSpinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00ff88;
      font-weight: 700;
      text-shadow: 0 0 8px #00ff88;
      display: none;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-black to-gray-900 text-white min-h-screen flex flex-col items-center p-4">

  <!-- Back Button -->
  <button onclick="tryClose()" class="fixed top-4 left-4 z-50 flex items-center text-cyan-400 hover:text-cyan-300 transition-colors duration-300">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3 mr-1">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
    <span class="font-medium text-base">Back</span>
  </button>

  <!-- Video Player Section -->
  <section class="w-full max-w-5xl mt-20 sm:mt-28 bg-neutral-900 rounded-xl shadow-lg p-4 sm:p-6 border border-cyan-500/20">
    <h1 class="text-center text-xl sm:text-2xl font-semibold text-cyan-300 mb-4 truncate">{{ name }}</h1>

    <!-- Enlarged Video Container -->
    <div class="relative w-full h-[45vh] mb-4 rounded-lg bg-black outline-none overflow-hidden">
      <video id="video" controls autoplay playsinline class="w-full h-full object-contain rounded-lg bg-black outline-none"></video>
      <iframe id="iframe" src="" allowfullscreen class="absolute inset-0 w-full h-full rounded-lg border-2 border-cyan-600 hidden"></iframe>
      <div id="bufferSpinner">Buffering...</div>
    </div>

    <!-- Quality Selector -->
    <div id="qualityContainer" class="flex justify-center items-center space-x-3">
      <label for="qualitySelect" class="text-cyan-400 font-semibold select-none">Quality:</label>
      <select id="qualitySelect" class="bg-gray-800 border border-cyan-500 text-cyan-400 py-1 px-3 rounded-md font-semibold focus:outline-none focus:ring-2 focus:ring-cyan-500"></select>
    </div>
  </section>

  <!-- Scrollable Channel List -->
  <section class="max-w-2xl w-full mt-8 p-4 rounded-2xl bg-[#0a0f1c] shadow-[0_0_12px_rgba(0,255,136,0.1)] max-h-[400px] overflow-y-auto">
    <h2 class="text-cyan-300 text-xl font-semibold mb-4 select-none">📺 Explore More</h2>
    {% for ch in channels %}
      <div class="flex justify-between items-center bg-[#121829] rounded-xl shadow-[0_4px_14px_rgba(0,255,136,0.15)] p-4 mb-4 hover:bg-[#1e2a38] hover:shadow-[0_6px_20px_rgba(0,255,136,0.4)] transition-all duration-300">
        <div class="flex items-center flex-grow gap-3 min-w-0">
          <span class="font-semibold text-[#32cd80] flex-shrink-0">{{ loop.index }}.</span>
          <span class="font-semibold text-white truncate" title="{{ ch.name }}">{{ ch.name }}</span>
        </div>
        <a href="{{ url_for('play_channel', key=ch.key) }}" class="bg-[#00ff88] text-[#0d1117] font-semibold py-2 px-5 rounded-xl no-underline transition-colors duration-300 hover:bg-[#00cc6a] hover:text-[#d0f0e6] hover:shadow-[0_0_10px_#00ff88] whitespace-nowrap select-none">▶ Watch</a>
      </div>
    {% else %}
      <p class="text-gray-400 italic text-center select-none">No channels available.</p>
    {% endfor %}
  </section>

  <script>
    const streamURL = "{{ stream_url }}";
    const video = document.getElementById("video");
    const iframe = document.getElementById("iframe");
    const qualitySelect = document.getElementById("qualitySelect");
    const qualityContainer = document.getElementById("qualityContainer");
    const bufferSpinner = document.getElementById("bufferSpinner");

    function tryClose() {
      window.close();
      setTimeout(() => {
        if (!window.closed) history.back();
      }, 300);
    }

    function isM3U8(url) {
      return url && url.toLowerCase().includes(".m3u8");
    }

    if (isM3U8(streamURL) && Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(streamURL);
      hls.attachMedia(video);
      video.classList.remove("hidden");
      iframe.classList.add("hidden");

      hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
        const levels = hls.levels;

        // Add Auto option
        const autoOption = document.createElement("option");
        autoOption.value = -1;
        autoOption.text = "Auto";
        autoOption.selected = true;
        qualitySelect.appendChild(autoOption);

        levels.forEach((level, index) => {
          const option = document.createElement("option");
          option.value = index;
          option.text = `${level.height}p`;
          qualitySelect.appendChild(option);
        });

        qualitySelect.addEventListener("change", function () {
          const selected = parseInt(this.value);
          hls.currentLevel = selected;
        });
      });

      hls.on(Hls.Events.BUFFER_STALLED, () => bufferSpinner.style.display = "block");
      hls.on(Hls.Events.BUFFER_APPENDED, () => bufferSpinner.style.display = "none");
      hls.on(Hls.Events.BUFFER_EOS, () => bufferSpinner.style.display = "none");

    } else if (isM3U8(streamURL) && video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = streamURL;
      video.classList.remove("hidden");
      iframe.classList.add("hidden");
    } else {
      video.classList.add("hidden");
      qualityContainer.classList.add("hidden");
      iframe.src = streamURL;
      iframe.classList.remove("hidden");
    }
  </script>
</body>
</html>
