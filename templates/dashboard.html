<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | T-Give Nexus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            glow: '0 0 15px rgba(0,255,255,0.6)',
          }
        }
      }
    }
  </script>
  <style>
    .glow-hover:hover {
      box-shadow: 0 0 15px rgba(0,255,255,0.6);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-black min-h-screen flex justify-center items-start p-6 text-white">

  <div class="w-full max-w-6xl flex flex-col md:flex-row gap-6">

    <!-- Profile Section -->
    <div class="bg-white/10 backdrop-blur-lg p-6 rounded-2xl shadow-xl w-full md:w-1/3 border border-white/20">
      <div class="flex flex-col items-center">
        <p class="text-sm text-gray-300">Email: {{ user.email }}</p>
      </div>
    </div>

    <!-- Menu Section -->
    <div class="bg-white/10 backdrop-blur-lg p-6 rounded-2xl shadow-xl w-full md:w-2/3 border border-white/20">
      <h2 class="text-2xl font-semibold mb-6 text-cyan-400">Dashboard Menu</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-center">

        <!-- Watch Now -->
        <a href="{{ url_for('browse') }}"
           class="glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Watch Now
        </a>

        <!-- Channel Categories -->
        <a href="{{ url_for('categories') }}"
           class="glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M3 4h18M4 8h16M5 12h14M6 16h12M7 20h10" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Channel Categories
        </a>

        <!-- About Us -->
        <a href="{{ url_for('about') }}"
           class="glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M13 16h-1v-4h-1m1-4h.01M12 12h.01M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9 9 4.03 9 9z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          About Us
        </a>

        <!-- Services -->
        <a href="{{ url_for('services') }}"
           class="glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M3 10h11M9 21V3M16 17l5-5-5-5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Services
        </a>

        <!-- Local Channels -->
        <a href="/custom-list"
           class="relative glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M3 4a1 1 0 011-1h16a1 1 0 011 1v16l-4-4H4a1 1 0 01-1-1V4z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Kenyan Locals TVs
        </a>

        <!-- More Shows -->
        <a href="more-channels"
           class="glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M15 12H3m6-6v12m12-6l-4-4m4 4l-4 4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          More Shows...
        </a>

        <!-- Settings -->
        <a href="/"
           class="glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 15.5A3.5 3.5 0 1012 8.5a3.5 3.5 0 000 7zm7.03-2.03a8.001 8.001 0 00-1.5-5.97l1.13-1.13a1 1 0 00-1.42-1.42l-1.13 1.13a8.001 8.001 0 00-5.97-1.5l-.35-1.42a1 1 0 00-1.94 0l-.35 1.42a8.001 8.001 0 00-5.97 1.5L3.36 5.05a1 1 0 10-1.42 1.42l1.13 1.13a8.001 8.001 0 00-1.5 5.97l-1.42.35a1 1 0 000 1.94l1.42.35a8.001 8.001 0 001.5 5.97l-1.13 1.13a1 1 0 101.42 1.42l1.13-1.13a8.001 8.001 0 005.97 1.5l.35 1.42a1 1 0 001.94 0l.35-1.42a8.001 8.001 0 005.97-1.5l1.13 1.13a1 1 0 001.42-1.42l-1.13-1.13a8.001 8.001 0 001.5-5.97l1.42-.35a1 1 0 000-1.94l-1.42-.35z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Settings
        </a>

        <!-- Logout -->
        <a href="{{ url_for('logout_current_user') }}"
           class="glow-hover bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2 col-span-full">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 11-4 0v-1m0-8V7a2 2 0 114 0v1" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Logout
        </a>

      </div>
    </div>

  </div>

</body>
</html>
