<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | View Tv</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            glow: '0 0 15px rgba(0,255,255,0.6)',
          },
          animation: {
            pop: 'pop 0.3s ease-out',
          },
          keyframes: {
            pop: {
              '0%': { transform: 'scale(1)', opacity: '1' },
              '50%': { transform: 'scale(1.4)', opacity: '0.6' },
              '100%': { transform: 'scale(1)', opacity: '1' },
            }
          }
        }
      }
    }
  </script>
  <style>
    .glow-hover:hover {
      box-shadow: 0 0 15px rgba(0,255,255,0.6);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-black min-h-screen flex justify-center items-start p-6 text-white">

  <div class="w-full max-w-6xl flex flex-col md:flex-row gap-6">

    <!-- Profile Section -->
    <div class="bg-white/10 backdrop-blur-lg p-6 rounded-2xl shadow-xl w-full md:w-1/3 border border-white/20">
      <div class="flex flex-col items-center">
        <p class="text-sm text-gray-300 mb-4">Email: {{ user.email }}</p>

        <!-- Countdown Timer (Smaller + Animated) -->
        <div id="timer" class="flex gap-1 text-center">
          <div class="bg-black/40 p-2 rounded-lg text-cyan-400 text-lg font-bold w-8 text-center" id="hours1">0</div>
          <div class="bg-black/40 p-2 rounded-lg text-cyan-400 text-lg font-bold w-8 text-center" id="hours2">0</div>
          <div class="bg-black/40 p-2 rounded-lg text-cyan-400 text-lg font-bold w-8 text-center" id="minutes1">0</div>
          <div class="bg-black/40 p-2 rounded-lg text-cyan-400 text-lg font-bold w-8 text-center" id="minutes2">0</div>
          <div class="bg-black/40 p-2 rounded-lg text-cyan-400 text-lg font-bold w-8 text-center" id="seconds1">0</div>
          <div class="bg-black/40 p-2 rounded-lg text-cyan-400 text-lg font-bold w-8 text-center" id="seconds2">0</div>
        </div>
      </div>
    </div>

    <!-- Menu Section -->
    <div class="bg-white/10 backdrop-blur-lg p-6 rounded-2xl shadow-xl w-full md:w-2/3 border border-white/20">
      <h2 class="text-2xl font-semibold mb-6 text-cyan-400">Dashboard Menu</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-center">

        <!-- Watch Now -->
        <a href="{{ url_for('browse') }}"
           class="glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4 3a1 1 0 011-1h2a1 1 0 01.894.553L9.382 5H15a1 1 0 011 1v2h-2V7H9a1 1 0 01-.894-.553L6.618 4H5v12h2v2H5a1 1 0 01-1-1V3z"/></svg>
          Watch Now
        </a>

        <!-- Channel Categories -->
        <a href="{{ url_for('categories') }}"
           class="glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4 3h12a1 1 0 011 1v2H3V4a1 1 0 011-1zM3 8h14v2H3V8zm0 4h14v2H3v-2zm0 4h14v2H3v-2z"/></svg>
          Channel Categories
        </a>

        <!-- About Us -->
        <a href="{{ url_for('about') }}"
           class="glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M9 12h1v5H9v-5zm0-6h1v4H9V6z"/></svg>
          About Us
        </a>

        <!-- Services -->
        <a href="{{ url_for('services') }}"
           class="glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a10 10 0 00-6.29 17.29l1.42-1.42a8 8 0 1111.31 0l1.42 1.42A10 10 0 0012 2z"/></svg>
          Services
        </a>

        <!-- Local Channels -->
        <a href="/custom-list"
           class="glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M3 4a1 1 0 011-1h16a1 1 0 011 1v16l-4-4H4a1 1 0 01-1-1V4z" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Kenyan Locals TVs
        </a>

        <!-- More Shows -->
        <a href="more-channels"
           class="glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M15 12H3m6-6v12m12-6l-4-4m4 4l-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          More Shows...
        </a>

        <!-- Settings -->
        <a href="/"
           class="glow-hover bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1012 8.5a3.5 3.5 0 000 7zm7.03-2.03a8.001 8.001 0 00-1.5-5.97l1.13-1.13a1 1 0 00-1.42-1.42l-1.13 1.13a8.001 8.001 0 00-5.97-1.5l-.35-1.42a1 1 0 00-1.94 0l-.35 1.42a8.001 8.001 0 00-5.97 1.5L3.36 5.05a1 1 0 10-1.42 1.42l1.13 1.13a8.001 8.001 0 00-1.5 5.97l-1.42.35a1 1 0 000 1.94l1.42.35a8.001 8.001 0 001.5 5.97l-1.13 1.13a1 1 0 101.42 1.42l1.13-1.13a8.001 8.001 0 005.97 1.5l.35 1.42a1 1 0 001.94 0l.35-1.42a8.001 8.001 0 005.97-1.5l1.13 1.13a1 1 0 001.42-1.42l-1.13-1.13a8.001 8.001 0 001.5-5.97l1.42-.35a1 1 0 000-1.94l-1.42-.35z" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Settings
        </a>

        <!-- Logout -->
        <a href="{{ url_for('logout_current_user') }}"
           class="glow-hover bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2 col-span-full">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 9V5a1 1 0 011-1h9v16h-9a1 1 0 01-1-1v-4H8v5a2 2 0 002 2h10a2 2 0 002-2V4a2 2 0 00-2-2H10a2 2 0 00-2 2v5h2zm-5.707.293a1 1 0 011.414 0L9 12l-3.293 3.293a1 1 0 01-1.414-1.414L6.586 13H1v-2h5.586l-1.293-1.293a1 1 0 010-1.414z"/></svg>
          Logout
        </a>
      </div>
    </div>

  </div>

  <!-- Timer Countdown Script with Animation -->
  <script>
    const totalSeconds = {{ time_remaining_seconds | safe }};
    let remaining = totalSeconds;

    function updateDigit(id, value) {
      const el = document.getElementById(id);
      if (el.textContent !== value) {
        el.textContent = value;
        el.classList.add('animate-pop');
        setTimeout(() => el.classList.remove('animate-pop'), 300);
      }
    }

    function updateTimerDisplay(hrs, mins, secs) {
      const pad = n => n.toString().padStart(2, '0');
      const [h1, h2] = pad(hrs);
      const [m1, m2] = pad(mins);
      const [s1, s2] = pad(secs);

      updateDigit('hours1', h1);
      updateDigit('hours2', h2);
      updateDigit('minutes1', m1);
      updateDigit('minutes2', m2);
      updateDigit('seconds1', s1);
      updateDigit('seconds2', s2);
    }

    function startCountdown() {
      const timerInterval = setInterval(() => {
        if (remaining <= 0) {
          clearInterval(timerInterval);
          updateTimerDisplay(0, 0, 0);
          return;
        }

        const hrs = Math.floor(remaining / 3600);
        const mins = Math.floor((remaining % 3600) / 60);
        const secs = remaining % 60;

        updateTimerDisplay(hrs, mins, secs);
        remaining--;
      }, 1000);
    }

    startCountdown();
  </script>

</body>
</html>
