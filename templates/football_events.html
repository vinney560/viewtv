<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Football Events | ViewTV</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at center, #111827 0%, #030712 100%);
    }
    .gradient-text {
      background: linear-gradient(90deg, #06b6d4 0%, #10b981 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .card-glass {
      background: rgba(31, 41, 55, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .event-card {
      transition: all 0.3s ease;
      border-left: 4px solid;
    }
    .event-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(6, 182, 212, 0.3);
    }
    .event-card.Live {
      border-left-color: #ef4444;
    }
    .event-card.Upcoming {
      border-left-color: #f59e0b;
    }
    .event-card.Replay {
      border-left-color: #3b82f6;
    }
    .status-badge {
      font-size: 0.875rem; /* Increased from 0.75rem */
      font-weight: 600;
      padding: 0.375rem 1rem; /* Increased padding */
      border-radius: 9999px;
    }
    .status-badge.Live {
      background-color: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    .status-badge.Upcoming {
      background-color: rgba(245, 158, 11, 0.2);
      color: #f59e0b;
    }
    .status-badge.Replay {
      background-color: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
    }
  </style>
</head>
<body class="h-full min-h-screen text-white flex flex-col items-center p-6"> <!-- Increased padding -->

  <div class="w-full max-w-4xl space-y-8"> <!-- Increased spacing -->
    <!-- Header -->
    <div class="text-center">
      <h1 class="text-4xl font-bold gradient-text mb-3">⚽ Football Events</h1> <!-- Increased size -->
      <p class="text-lg text-gray-400">Live, Upcoming, and Replay Matches</p> <!-- Increased size -->
    </div>

    <!-- Events List -->
    <div class="space-y-4"> <!-- Increased spacing between cards -->
      {% for event in events %}
        <div class="event-card {{ event.status }} card-glass p-5 rounded-lg flex justify-between items-center"> <!-- Increased padding -->
          <a href="{{ event.href }}" target="_blank" class="text-xl font-medium text-cyan-300 hover:text-cyan-200 transition flex-1"> <!-- Increased text size -->
            {{ event.text }}
          </a>
          <span class="status-badge {{ event.status }} ml-4">
            {{ event.status }}
          </span>
        </div>
      {% else %}
        <div class="card-glass p-6 text-center text-gray-400 rounded-lg text-lg"> <!-- Increased text size -->
          No Live, Replay, or Upcoming events found
        </div>
      {% endfor %}
    </div>
  </div>

</body>
</html>
