<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Football | ViewTV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        .event-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .event-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }
        .event-card.Live::before {
            background: linear-gradient(to bottom, #ef4444, #dc2626);
        }
        .event-card.Upcoming::before {
            background: linear-gradient(to bottom, #f59e0b, #d97706);
        }
        .event-card.Replay::before {
            background: linear-gradient(to bottom, #3b82f6, #2563eb);
        }
        .event-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }
        .status-badge {
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .status-badge.Live {
            background: linear-gradient(to right, #ef4444, #dc2626);
        }
        .status-badge.Upcoming {
            background: linear-gradient(to right, #f59e0b, #d97706);
        }
        .status-badge.Replay {
            background: linear-gradient(to right, #3b82f6, #2563eb);
        }
        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-gray-100">
    <div class="container mx-auto px-4 py-12 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-emerald-400 mb-3">
                ⚽ Football Events
            </h1>
            <p class="text-lg text-gray-400">Click any match to watch (opens stream directly)</p>
        </div>

        <!-- Events Grid -->
        <div class="grid gap-5" id="events-container">
            {% for event in events %}
            <div class="event-card {{ event.status }} rounded-xl p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:shadow-lg"
                 data-href="{{ event.href }}">
                <div class="flex-1">
                    <h3 class="text-xl font-semibold text-white">
                        {{ event.text }}
                    </h3>
                </div>
                <div class="flex items-center gap-2">
                    <span class="status-badge {{ event.status }} text-white px-4 py-2 rounded-full shadow-md">
                        {{ event.status }}
                    </span>
                    <span class="loading-spinner hidden"></span>
                </div>
            </div>
            {% else %}
            <div class="event-card rounded-xl p-8 text-center">
                <p class="text-gray-400 text-lg">No football events available at this time</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const eventCards = document.querySelectorAll('.event-card[data-href]');
            
            eventCards.forEach(card => {
                card.addEventListener('click', async function(e) {
                    const originalUrl = this.getAttribute('data-href');
                    const spinner = this.querySelector('.loading-spinner');
                    
                    // Show loading spinner
                    spinner.classList.remove('hidden');
                    
                    try {
                        // Extract the m3u8 URL from the original URL
                        const urlParams = new URL(originalUrl).searchParams;
                        let mediaUrl = urlParams.get('media');
                        
                        // If the URL is already the direct stream, use it directly
                        if (!mediaUrl && originalUrl.includes('.m3u8')) {
                            mediaUrl = originalUrl;
                        }
                        
                        // Validate we got a proper stream URL
                        if (mediaUrl && mediaUrl.includes('.m3u8')) {
                            // Open the direct stream URL in a new tab
                            const newTab = window.open('', '_blank');
                            newTab.location.href = mediaUrl;
                        } else {
                            throw new Error('No valid stream URL found');
                        }
                    } catch (error) {
                        console.error('Error processing stream URL:', error);
                        alert('Could not load the stream. Please try again later.');
                    } finally {
                        // Hide spinner (though tab will have opened by now)
                        spinner.classList.add('hidden');
                    }
                });
            });
        });
    </script>
</body>
</html>
