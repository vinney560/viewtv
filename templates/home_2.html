<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home | ViewTv</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at center, #111827 0%, #030712 100%);
    }
    .glow-hover:hover {
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
      transform: translateY(-2px);
    }
    .nav-btn {
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }
    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.25);
    }
    .gradient-text {
      background: linear-gradient(90deg, #06b6d4 0%, #10b981 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .card-glass {
      background: rgba(31, 41, 55, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body class="h-full min-h-screen text-white flex flex-col items-center p-4">

  <!-- Toast Notifications -->
  <div id="toast-container" class="fixed top-20 right-4 space-y-2 z-50">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="animate-fade-in px-4 py-3 rounded-lg shadow-lg text-sm font-medium text-white
            {% if category == 'success' %} bg-green-600/90
            {% elif category == 'error' %} bg-red-600/90
            {% else %} bg-blue-600/90 {% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>

  <!-- Header -->
  <header class="w-full max-w-4xl flex items-center justify-between p-4 card-glass rounded-2xl shadow-lg mb-6">
    <!-- Dashboard Button -->
    <a href="{{ url_for('dashboard') }}" class="nav-btn p-2 rounded-full hover:bg-cyan-600/30 transition flex items-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
    </a>

    <!-- Logo -->
    <h1 class="text-xl font-bold gradient-text">ViewTV</h1>

    <!-- Right Navigation -->
    <div class="flex items-center space-x-3">
      <!-- Plus Button -->
      <a href="{{ url_for('get_plus') }}" class="nav-btn flex items-center space-x-2 px-4 py-2 rounded-xl bg-gray-700/60 hover:bg-cyan-600/50 transition border border-gray-600/30">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cyan-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        <span class="text-sm font-medium text-cyan-200">Plus</span>
      </a>

      <!-- Account Button -->
      <a href="{{ url_for('account') }}" class="nav-btn p-2 rounded-full hover:bg-blue-600/30 transition flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="w-full max-w-2xl flex flex-col items-center space-y-6 px-4 flex-grow">

    <!-- Exclusive Sports -->
    <a href="{{ url_for('sports_playlist') }}" class="w-full group relative overflow-hidden py-5 flex items-center justify-center space-x-3 text-xl md:text-2xl font-bold rounded-xl bg-gradient-to-r from-cyan-500 to-emerald-500 text-gray-900 glow-hover transition-all transform hover:-translate-y-1 hover:shadow-lg">
      <div class="absolute inset-0 bg-gradient-to-r from-cyan-600/20 to-emerald-600/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c1.657 0 3 1.343 3 3s-1.343 3-3 3m0 0c-1.657 0-3-1.343-3-3s1.343-3 3-3m0 0V4m0 10v6m-4-3h8" />
      </svg>
      <span class="relative">Exclusive Sports</span>
    </a>

    <!-- Category & Country Buttons -->
    <div class="flex w-full space-x-4">
      <!-- Category -->
      <a href="{{ url_for('categories') }}" class="w-1/2 py-4 flex items-center justify-center space-x-2 bg-gray-800/60 hover:bg-cyan-700/50 text-cyan-300 font-semibold rounded-xl glow-hover transition-all border border-gray-700/30 hover:border-cyan-500/30">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-cyan-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
        </svg>
        <span>Category</span>
      </a>

      <!-- Country -->
      <a href="{{ url_for('countries') }}" class="w-1/2 py-4 flex items-center justify-center space-x-2 bg-gray-800/60 hover:bg-cyan-700/50 text-cyan-300 font-semibold rounded-xl glow-hover transition-all border border-gray-700/30 hover:border-cyan-500/30">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-cyan-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>Country</span>
      </a>
    </div>

    <!-- View TV Playlist -->
    <a href="{{ url_for('custom_list') }}" class="w-full group relative overflow-hidden py-5 flex items-center justify-center space-x-3 text-xl md:text-2xl font-bold rounded-xl bg-gradient-to-r from-cyan-500 to-emerald-500 text-gray-900 glow-hover transition-all transform hover:-translate-y-1 hover:shadow-lg">
      <div class="absolute inset-0 bg-gradient-to-r from-cyan-600/20 to-emerald-600/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553 2.276A1 1 0 0120 13.118v.764a1 1 0 01-.447.842L15 17v-7zM4 6h16M4 10h10M4 14h6" />
      </svg>
      <span class="relative">View TV Playlist</span>
    </a>

    <!-- Movies Row -->
    <div class="flex w-full space-x-4">
      <!-- Plus Movies Button -->
      <a href="{{ url_for('plus_movies') }}" class="w-1/2 py-4 flex items-center justify-center space-x-2 bg-gradient-to-r from-purple-600 to-blue-500 text-white font-semibold rounded-xl glow-hover transition-all transform hover:-translate-y-0.5 hover:shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z" />
        </svg>
        <span>Plus Movies</span>
      </a>

      <!-- Moviepire Button -->
      <a href="/embed/moviepire" class="w-1/2 py-4 flex items-center justify-center space-x-2 bg-gradient-to-r from-red-600 to-pink-500 text-white font-semibold rounded-xl glow-hover transition-all transform hover:-translate-y-0.5 hover:shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553 2.276A1 1 0 0120 13.118v.764a1 1 0 01-.447.842L15 17v-7zM4 6h16M4 10h10M4 14h6" />
        </svg>
        <span>Moviepire</span>
      </a>
    </div>

  </main>

  <!-- Footer Navigation -->
  <footer class="w-full max-w-4xl mt-8 p-4 card-glass rounded-2xl shadow-lg">
    <div class="flex justify-around">
      <a href="{{ url_for('dashboard') }}" class="flex flex-col items-center text-gray-300 hover:text-cyan-400 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
        <span class="text-xs mt-1">Dashboard</span>
      </a>
      <a href="{{ url_for('get_plus') }}" class="flex flex-col items-center text-gray-300 hover:text-green-400 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        <span class="text-xs mt-1">Plus</span>
      </a>
      <a href="{{ url_for('assistance') }}" class="flex flex-col items-center text-gray-300 hover:text-yellow-400 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="text-xs mt-1">Help</span>
      </a>
      <a href="{{ url_for('account') }}" class="flex flex-col items-center text-gray-300 hover:text-blue-400 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        <span class="text-xs mt-1">Account</span>
      </a>
    </div>
  </footer>

  <!-- Toast Auto Dismiss Script -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const toasts = document.querySelectorAll('.animate-fade-in');
      toasts.forEach((toast) => {
        setTimeout(() => {
          toast.classList.add('opacity-0', 'translate-x-10');
          setTimeout(() => toast.remove(), 500);
        }, 4000);
      });
    });
  </script>

</body>
</html>
