<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live Football Streams</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col h-full text-slate-100">

  <!-- Header -->
  <header class="bg-slate-800 p-4 flex flex-col md:flex-row items-center justify-between">
    <h1 class="text-2xl font-bold flex items-center">
      <!-- Soccer Ball SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-cyan-400 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 2l3 7h7l-5.5 4 2.5 7L12 16l-7 4 2.5-7L2 9h7l3-7z" />
      </svg>
      Live Football
    </h1>

    <!-- Search + Categories -->
    <div class="mt-4 md:mt-0 flex space-x-2 items-center">
      <input
        id="searchInput"
        type="text"
        placeholder="Search teams or keywords…"
        class="px-3 py-2 rounded-md bg-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-400"
      />
      <div id="categories" class="flex space-x-1">
        <button data-cat="all" class="category-btn px-3 py-1 rounded-md bg-cyan-600 hover:bg-cyan-500">All</button>
        <button data-cat="fifa" class="category-btn px-3 py-1 rounded-md bg-slate-700 hover:bg-slate-600">FIFA</button>
        <button data-cat="uefa" class="category-btn px-3 py-1 rounded-md bg-slate-700 hover:bg-slate-600">UEFA</button>
        <button data-cat="epl" class="category-btn px-3 py-1 rounded-md bg-slate-700 hover:bg-slate-600">EPL</button>
      </div>
    </div>
  </header>

  <!-- Streams Grid -->
  <main class="flex-1 overflow-y-auto p-4">
    <div id="streamsContainer" class="grid gap-4 grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4"></div>
    <p id="noResults" class="text-center text-slate-500 hidden">No live streams found.</p>
  </main>

  <!-- Footer -->
  <footer class="bg-slate-800 p-2 text-center text-slate-500">
    Powered by YouTube Data API v3
  </footer>

  <!-- JS: polling, search, categories -->
  <script>
    let currentCat = 'all';
    let debounceTimeout;

    async function loadStreams() {
      const q = document.getElementById('searchInput').value;
      const res = await fetch(`/api/live_streams?cat=${currentCat}&q=${encodeURIComponent(q)}`);
      const streams = await res.json();
      const container = document.getElementById('streamsContainer');
      container.innerHTML = '';
      if (!streams.length) {
        document.getElementById('noResults').classList.remove('hidden');
      } else {
        document.getElementById('noResults').classList.add('hidden');
        streams.forEach(s => {
          const card = document.createElement('div');
          card.className = 'bg-slate-800 rounded-lg shadow-lg overflow-hidden hover:scale-105 transition';
          card.innerHTML = `
            <iframe class="w-full h-40" src="https://www.youtube.com/embed/${s.video_id}?autoplay=0" allowfullscreen></iframe>
            <div class="p-3">
              <h2 class="text-sm font-semibold text-slate-100">${s.title}</h2>
              <p class="text-xs text-slate-400">${new Date(s.published_at).toLocaleString()}</p>
              <p class="text-xs text-slate-400">📺 ${s.channel}</p>
            </div>`;
          container.appendChild(card);
        });
      }
    }

    // Debounced live search
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(debounceTimeout);
      debounceTimeout = setTimeout(loadStreams, 500);
    });

    // Category buttons
    document.querySelectorAll('.category-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentCat = btn.dataset.cat;
        document.querySelectorAll('.category-btn').forEach(b => b.classList.replace('bg-cyan-600','bg-slate-700'));
        btn.classList.replace('bg-slate-700','bg-cyan-600');
        loadStreams();
      });
    });

    // Initial load + polling
    loadStreams();
    setInterval(loadStreams, 60_000);  // refresh every 60s
  </script>
</body>
</html>
