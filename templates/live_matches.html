<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Football Matches</title>
  <style>
    body {
      background-color: #0d1117;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .video-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .video-card {
      width: 420px;
      background: #161b22;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 0 10px #0f0f0f;
    }
    iframe {
      width: 100%;
      height: 230px;
      border-radius: 10px;
      border: none;
    }
    h3 {
      font-size: 1rem;
      margin: 10px 0 5px;
    }
    p {
      font-size: 0.85rem;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <h1>⚽ Live Football Matches</h1>
  <div class="video-container">
    {% for stream in streams %}
    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/{{ stream.video_id }}" allowfullscreen></iframe>
      <h3>{{ stream.title }}</h3>
      <p>By {{ stream.channel }} <br><small>{{ stream.published_at }}</small></p>
    </div>
    {% endfor %}
  </div>
</body>
</html>
