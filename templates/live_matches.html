<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live Football | StreamTv</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fade-in': 'fadeIn 0.3s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              'from': { opacity: '0', transform: 'translateY(10px)' },
              'to': { opacity: '1', transform: 'translateY(0)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    .stream-card {
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .stream-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.2), 0 4px 6px -2px rgba(6, 182, 212, 0.1);
    }
    .live-badge {
      animation: pulse-slow 2s infinite;
    }
    .category-btn {
      transition: all 0.2s ease;
    }
    iframe {
      aspect-ratio: 16/9;
    }
    .updating-indicator {
      animation: pulse 1.5s infinite;
    }
    .refresh-spin {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .sporty-banner {
      background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
    }
    .sporty-tag {
      background-color: #3b82f6;
    }
  </style>
</head>
<body class="flex flex-col h-full text-gray-100">

  <!-- Header -->
  <header class="bg-gray-800/80 backdrop-blur-sm border-b border-gray-700 p-4 sticky top-0 z-10">
    <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center">
        <!-- Soccer Ball SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-cyan-400 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 2l3 7h7l-5.5 4 2.5 7L12 16l-7 4 2.5-7L2 9h7l3-7z" />
        </svg>
        <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
          Live Football
        </h1>
      </div>

      <!-- Categories and Refresh -->
      <div class="flex items-center gap-3">
        <div id="categories" class="flex flex-wrap justify-center gap-2">
          <button data-cat="all" class="category-btn px-4 py-1.5 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-sm font-medium">All</button>
          <button data-cat="fifa" class="category-btn px-4 py-1.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-medium">FIFA</button>
          <button data-cat="uefa" class="category-btn px-4 py-1.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-medium">UEFA</button>
          <button data-cat="epl" class="category-btn px-4 py-1.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-medium">EPL</button>
          <button data-cat="sporty" class="category-btn px-4 py-1.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-medium">SportyTV</button>
        </div>
        <button id="refreshBtn" class="p-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors" title="Refresh streams">
          <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Streams Grid -->
  <main class="flex-1 overflow-y-auto p-4 md:p-6">
    <div class="container mx-auto">
      <div id="updatingIndicator" class="hidden flex items-center justify-center mb-4 text-cyan-400 text-sm">
        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-cyan-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Updating streams...
      </div>

      <!-- SportyTV Section (Always Visible) -->
      <div id="sportySection" class="mb-8">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-bold flex items-center">
            <span class="sporty-tag text-white text-xs px-2 py-1 rounded mr-2">OFFICIAL</span>
            SportyTV Live Streams
          </h2>
          <div id="sportyStatus" class="text-sm text-gray-400"></div>
        </div>
        <div id="sportyContainer" class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
        <div id="sportyOffline" class="hidden text-center py-8 bg-gray-800/50 rounded-lg border border-gray-700/30">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-gray-600 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <p class="text-gray-400">SportyTV is currently offline. Check back later.</p>
        </div>
      </div>

      <!-- All Other Streams -->
      <div id="mainStreamsSection">
        <h2 class="text-xl font-bold mb-4">Live Football Streams</h2>
        <div id="streamsContainer" class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
        <p id="noResults" class="text-center text-gray-500 py-10 hidden">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-gray-600 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          No live streams found for this category.
        </p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800/50 border-t border-gray-700/30 p-3 text-center text-gray-500 text-sm">
    <div class="container mx-auto">
      <div>Powered by YouTube Data API v3</div>
      <div class="mt-1">Showing <span id="streamCount">0</span> live streams | Last updated: <span id="lastUpdated">never</span></div>
    </div>
  </footer>

  <!-- JavaScript -->
  <script>
    let currentCat = 'all';
    const POLL_INTERVAL = 30 * 60 * 1000; // 30 minutes in milliseconds (matches backend cache)
    let pollTimeout;

    // Format time for display
    function formatTime(date) {
      if (!date) return "Live Now";
      return new Date(date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function formatDate(date) {
      if (!date) return "Today";
      return new Date(date).toLocaleDateString([], { month: 'short', day: 'numeric' });
    }

    // Create a stream card element
    function createStreamCard(s, isSporty = false) {
      const card = document.createElement('div');
      card.className = `stream-card bg-gray-800/80 rounded-xl overflow-hidden border border-gray-700/50 hover:border-cyan-400/30 transition-all animate-fade-in ${isSporty ? 'border-blue-500/50' : ''}`;
      card.innerHTML = `
        <div class="relative">
          <iframe 
            class="w-full" 
            src="https://www.youtube.com/embed/${s.video_id}?autoplay=0" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen
            loading="lazy"
          ></iframe>
          <span class="live-badge absolute top-2 left-2 px-2 py-1 rounded-md bg-red-600 text-xs font-bold flex items-center">
            <span class="w-2 h-2 rounded-full bg-white mr-1 animate-pulse"></span>
            LIVE
          </span>
          ${isSporty ? `<span class="sporty-tag absolute top-2 right-2 px-2 py-1 rounded-md text-xs font-bold">SPORTYTV</span>` : ''}
        </div>
        <div class="p-4">
          <h2 class="text-md font-semibold text-gray-100 line-clamp-2 mb-2">${s.title || "Live Football Stream"}</h2>
          <div class="flex items-center text-xs text-gray-400 space-x-3">
            <span class="flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
              ${s.channel || "Sporty TV"}
            </span>
            <span class="flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              ${formatDate(s.published_at)} • ${formatTime(s.published_at)}
            </span>
          </div>
        </div>`;
      return card;
    }

    // Load SportyTV streams separately (now handled by backend)
    async function loadSportyStreams() {
      try {
        const response = await fetch('/api/live_streams?cat=sporty');
        const streams = await response.json();
        const container = document.getElementById('sportyContainer');
        const offlineMsg = document.getElementById('sportyOffline');
        const statusElement = document.getElementById('sportyStatus');
        
        container.innerHTML = '';
        
        if (streams.length > 0) {
          offlineMsg.classList.add('hidden');
          streams.forEach(stream => {
            container.appendChild(createStreamCard(stream, true));
          });
          statusElement.textContent = `${streams.length} live stream${streams.length > 1 ? 's' : ''}`;
        } else {
          offlineMsg.classList.remove('hidden');
          statusElement.textContent = 'Offline';
        }
      } catch (error) {
        console.error('Error loading SportyTV streams:', error);
        document.getElementById('sportyOffline').classList.remove('hidden');
      }
    }

    // Load streams for current category
    async function loadStreams() {
      try {
        // Show loading state
        document.getElementById('updatingIndicator').classList.remove('hidden');
        document.getElementById('refreshIcon').classList.add('refresh-spin');
        
        // Load both SportyTV and regular streams
        await Promise.all([loadSportyStreams(), loadRegularStreams()]);
        
      } catch (error) {
        console.error('Error loading streams:', error);
        document.getElementById('noResults').classList.remove('hidden');
      } finally {
        // Hide loading state
        document.getElementById('updatingIndicator').classList.add('hidden');
        document.getElementById('refreshIcon').classList.remove('refresh-spin');
        
        // Schedule next poll (30 minutes to match backend cache)
        clearTimeout(pollTimeout);
        pollTimeout = setTimeout(loadStreams, POLL_INTERVAL);
      }
    }

    // Load regular streams (non-SportyTV)
    async function loadRegularStreams() {
      const response = await fetch(`/api/live_streams?cat=${currentCat}`);
      const streams = await response.json();
      const container = document.getElementById('streamsContainer');
      
      // Clear existing streams
      container.innerHTML = '';
      
      if (streams.length === 0) {
        document.getElementById('noResults').classList.remove('hidden');
      } else {
        // Add new streams
        streams.forEach(stream => {
          // Skip SportyTV streams since we show them separately
          if (!stream.channel.toLowerCase().includes('sporty')) {
            container.appendChild(createStreamCard(stream));
          }
        });
        document.getElementById('noResults').classList.add('hidden');
      }
      
      // Update counters
      document.getElementById('streamCount').textContent = streams.length;
      document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString([], { 
        hour: '2-digit', 
        minute: '2-digit',
        second: '2-digit'
      });
    }

    // Category buttons
    document.querySelectorAll('.category-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentCat = btn.dataset.cat;
        document.querySelectorAll('.category-btn').forEach(b => {
          b.classList.remove('bg-cyan-600', 'hover:bg-cyan-500');
          b.classList.add('bg-gray-700', 'hover:bg-gray-600');
        });
        btn.classList.remove('bg-gray-700', 'hover:bg-gray-600');
        btn.classList.add('bg-cyan-600', 'hover:bg-cyan-500');
        loadStreams();
      });
    });

    // Manual refresh button
    document.getElementById('refreshBtn').addEventListener('click', () => {
      clearTimeout(pollTimeout);
      loadStreams();
    });

    // Initial load + start polling
    loadStreams();
  </script>
</body>
</html>
