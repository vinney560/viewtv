<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live Football | StreamTv</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .stream-card {
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .stream-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.2);
    }
    .live-badge {
      animation: pulse 2s infinite;
    }
    .sporty-tag {
      background-color: #3b82f6;
    }
  </style>
</head>
<body class="flex flex-col h-full text-gray-100">
  <header class="bg-gray-800/80 border-b border-gray-700 p-4 sticky top-0 z-10">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
        Live Football
      </h1>
      <button id="refreshBtn" class="p-2 rounded-lg bg-gray-700 hover:bg-gray-600">
        <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
      </button>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto p-4">
    <div class="container mx-auto">
      <!-- SportyTV Section -->
      <div class="mb-8">
        <h2 class="text-xl font-bold mb-4 flex items-center">
          <span class="sporty-tag text-white text-xs px-2 py-1 rounded mr-2">OFFICIAL</span>
          SportyTV Live Stream
        </h2>
        <div id="sportyContainer" class="grid grid-cols-1 gap-4"></div>
        <div id="sportyOffline" class="hidden text-center py-8 bg-gray-800/50 rounded-lg">
          <p class="text-gray-400">SportyTV is currently offline</p>
        </div>
      </div>

      <!-- Other Streams -->
      <div>
        <h2 class="text-xl font-bold mb-4">Live Football Streams</h2>
        <div id="streamsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        <p id="noResults" class="text-center text-gray-500 py-10 hidden">
          No live streams found
        </p>
      </div>
    </div>
  </main>

  <footer class="bg-gray-800/50 border-t border-gray-700/30 p-3 text-center text-sm text-gray-500">
    <div>Showing <span id="streamCount">0</span> streams | Updated: <span id="lastUpdated">never</span></div>
  </footer>

  <script>
    const SPORTY_CHANNEL_ID = "UCwu87p766uwEyzG1p8dEMlg";
    let currentCat = 'all';
    const POLL_INTERVAL = 30 * 60 * 1000; // 30 minutes
    let pollTimeout;

    // Format time for display
    function formatTime(date) {
      if (!date) return "Live Now";
      return new Date(date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function createStreamCard(stream, isSporty = false) {
      const card = document.createElement('div');
      card.className = `stream-card bg-gray-800/80 rounded-lg overflow-hidden border border-gray-700/50 ${isSporty ? 'border-blue-500/50' : ''}`;
      card.innerHTML = `
        <div class="relative">
          <iframe class="w-full aspect-video" 
                  src="https://www.youtube.com/embed/${stream.video_id}?autoplay=0"
                  frameborder="0" allowfullscreen></iframe>
          <span class="live-badge absolute top-2 left-2 px-2 py-1 rounded-md bg-red-600 text-xs font-bold">
            LIVE
          </span>
          ${isSporty ? `<span class="sporty-tag absolute top-2 right-2 px-2 py-1 rounded-md text-xs font-bold">SPORTY</span>` : ''}
        </div>
        <div class="p-3">
          <h3 class="font-medium line-clamp-2">${stream.title || "Live Football"}</h3>
          <div class="text-xs text-gray-400 mt-2">${stream.channel || "Unknown"} • ${formatTime(stream.published_at)}</div>
        </div>
      `;
      return card;
    }

    // SportyTV specific functions
    async function checkSportyLive() {
      try {
        const response = await fetch(`https://www.youtube.com/channel/${SPORTY_CHANNEL_ID}/live`, {
          redirect: 'manual'
        });
        
        if (response.status === 302) {
          const location = response.headers.get('location');
          if (location && location.includes('/watch?v=')) {
            const videoId = location.split('v=')[1].split('&')[0];
            return {
              video_id: videoId,
              title: "Sporty TV Live Football",
              channel: "Sporty TV",
              published_at: null,
              is_official: true
            };
          }
        }
      } catch (e) {
        console.error("SportyTV check failed:", e);
      }
      return null;
    }

    async function loadSportyStream() {
      const container = document.getElementById('sportyContainer');
      const offlineMsg = document.getElementById('sportyOffline');
      
      container.innerHTML = '';
      offlineMsg.classList.add('hidden');
      
      const sportyStream = await checkSportyLive();
      if (sportyStream) {
        container.appendChild(createStreamCard(sportyStream, true));
      } else {
        offlineMsg.classList.remove('hidden');
      }
    }

    // Regular stream loading
    async function loadStreams() {
      try {
        const response = await fetch(`/api/live_streams?cat=${currentCat}`);
        const streams = await response.json();
        const container = document.getElementById('streamsContainer');
        
        container.innerHTML = '';
        document.getElementById('noResults').classList.toggle('hidden', streams.length > 0);
        
        streams.forEach(stream => {
          container.appendChild(createStreamCard(stream));
        });
        
        document.getElementById('streamCount').textContent = streams.length;
        document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
      } catch (error) {
        console.error("Error loading streams:", error);
      }
    }

    async function refreshAll() {
      await Promise.all([loadSportyStream(), loadStreams()]);
    }

    // Initial load
    refreshAll();
    
    // Setup refresh button
    document.getElementById('refreshBtn').addEventListener('click', () => {
      clearTimeout(pollTimeout);
      refreshAll();
    });

    // Auto-refresh
    pollTimeout = setTimeout(() => {
      refreshAll();
    }, POLL_INTERVAL);
  </script>
</body>
</html>
