<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live | StreamTv</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fade-in': 'fadeIn 0.3s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              'from': { opacity: '0', transform: 'translateY(10px)' },
              'to': { opacity: '1', transform: 'translateY(0)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    .stream-card {
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .stream-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.2), 0 4px 6px -2px rgba(6, 182, 212, 0.1);
    }
    .live-badge {
      animation: pulse-slow 2s infinite;
    }
    .category-btn {
      transition: all 0.2s ease;
    }
    iframe {
      aspect-ratio: 16/9;
    }
  </style>
</head>
<body class="flex flex-col h-full text-gray-100">

  <!-- Header -->
  <header class="bg-gray-800/80 backdrop-blur-sm border-b border-gray-700 p-4 sticky top-0 z-10">
    <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center">
        <!-- Soccer Ball SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-cyan-400 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 2l3 7h7l-5.5 4 2.5 7L12 16l-7 4 2.5-7L2 9h7l3-7z" />
        </svg>
        <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
          Football | StreamTv
        </h1>
      </div>

      <!-- Search + Categories -->
      <div class="w-full md:w-auto flex flex-col md:flex-row gap-3 items-center">
        <div class="relative w-full md:w-64">
          <input
            id="searchInput"
            type="text"
            placeholder="Search teams or keywords…"
            class="w-full px-4 py-2 rounded-lg bg-gray-700/80 border border-gray-600 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition-all"
          />
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 absolute right-3 top-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <div id="categories" class="flex flex-wrap justify-center gap-2">
          <button data-cat="all" class="category-btn px-4 py-1.5 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-sm font-medium">All</button>
          <button data-cat="fifa" class="category-btn px-4 py-1.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-medium">FIFA</button>
          <button data-cat="uefa" class="category-btn px-4 py-1.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-medium">UEFA</button>
          <button data-cat="epl" class="category-btn px-4 py-1.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-medium">EPL</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Streams Grid -->
  <main class="flex-1 overflow-y-auto p-4 md:p-6">
    <div class="container mx-auto">
      <div id="streamsContainer" class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 animate-fade-in"></div>
      <p id="noResults" class="text-center text-gray-500 py-10 hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-gray-600 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        No live streams found. Try a different search or category.
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800/50 border-t border-gray-700/30 p-3 text-center text-gray-500 text-sm">
    <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
      <div>Powered by YouTube Data API v3</div>
      <div class="mt-2 md:mt-0 flex items-center justify-center space-x-2">
        <span class="flex items-center">
          <span class="w-2 h-2 rounded-full bg-green-400 mr-1 animate-pulse-slow"></span>
          <span id="streamCount">0</span> live streams
        </span>
        <span>•</span>
        <span>Last updated: <span id="lastUpdated">just now</span></span>
      </div>
    </div>
  </footer>

  <!-- JS: polling, search, categories -->
  <script>
    let currentCat = 'all';
    let debounceTimeout;

    function formatTime(date) {
      return new Date(date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function formatDate(date) {
      return new Date(date).toLocaleDateString([], { month: 'short', day: 'numeric' });
    }

    async function loadStreams() {
      try {
        const q = document.getElementById('searchInput').value;
        const res = await fetch(`/api/live_streams?cat=${currentCat}&q=${encodeURIComponent(q)}`);
        const streams = await res.json();
        const container = document.getElementById('streamsContainer');
        
        container.innerHTML = '';
        
        if (!streams.length) {
          document.getElementById('noResults').classList.remove('hidden');
        } else {
          document.getElementById('noResults').classList.add('hidden');
          streams.forEach(s => {
            const card = document.createElement('div');
            card.className = 'stream-card bg-gray-800/80 rounded-xl overflow-hidden border border-gray-700/50 hover:border-cyan-400/30 transition-all animate-fade-in';
            card.innerHTML = `
              <div class="relative">
                <iframe 
                  class="w-full" 
                  src="https://www.youtube.com/embed/${s.video_id}?autoplay=0" 
                  frameborder="0" 
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                  allowfullscreen
                  loading="lazy"
                ></iframe>
                <span class="live-badge absolute top-2 left-2 px-2 py-1 rounded-md bg-red-600 text-xs font-bold flex items-center">
                  <span class="w-2 h-2 rounded-full bg-white mr-1 animate-pulse"></span>
                  LIVE
                </span>
              </div>
              <div class="p-4">
                <h2 class="text-md font-semibold text-gray-100 line-clamp-2 mb-2">${s.title}</h2>
                <div class="flex items-center text-xs text-gray-400 space-x-3">
                  <span class="flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    ${s.channel}
                  </span>
                  <span class="flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    ${formatDate(s.published_at)} • ${formatTime(s.published_at)}
                  </span>
                </div>
              </div>`;
            container.appendChild(card);
          });
        }
        
        // Update footer stats
        document.getElementById('streamCount').textContent = streams.length;
        document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
      } catch (error) {
        console.error('Error loading streams:', error);
      }
    }

    // Debounced live search
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(debounceTimeout);
      debounceTimeout = setTimeout(loadStreams, 500);
    });

    // Category buttons
    document.querySelectorAll('.category-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentCat = btn.dataset.cat;
        document.querySelectorAll('.category-btn').forEach(b => {
          b.classList.remove('bg-cyan-600', 'hover:bg-cyan-500');
          b.classList.add('bg-gray-700', 'hover:bg-gray-600');
        });
        btn.classList.remove('bg-gray-700', 'hover:bg-gray-600');
        btn.classList.add('bg-cyan-600', 'hover:bg-cyan-500');
        loadStreams();
      });
    });

    // Initial load + polling
    loadStreams();
    setInterval(loadStreams, 60_000);  // refresh every 60s
  </script>
</body>
</html>
