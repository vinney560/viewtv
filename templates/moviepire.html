<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Tv - Moviepire</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    body {
      margin: 0;
      background: #0f172a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .glass-effect {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .gradient-text {
      background: linear-gradient(90deg, #38bdf8 0%, #818cf8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .control-btn {
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }
    
    .control-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px -5px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body class="relative">
  <!-- Animated Background -->
  <div class="absolute inset-0 overflow-hidden z-0">
    <div class="absolute inset-0 bg-gradient-to-br from-sky-900/30 to-indigo-900/30"></div>
    <div class="absolute inset-0 opacity-20" style="background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1IiBoZWlnaHQ9IjUiPgo8cmVjdCB3aWR0aD0iNSIgaGVpZ2h0PSI1IiBmaWxsPSIjMDAwMDAwIj48L3JlY3Q+CjxwYXRoIGQ9Ik0wIDVMNSAwWk02IDRMNCA2Wk0tMSAxTDEgLTFaIiBzdHJva2U9IiMxMTExMTEiIHN0cm9rZS13aWR0aD0iMSI+PC9wYXRoPgo8L3N2Zz4=')"></div>
  </div>

  <!-- Header -->
  <header class="glass-effect z-10 px-6 py-4 flex items-center justify-between shadow-lg">
    <div class="flex items-center space-x-3">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-sky-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553 2.276A1 1 0 0120 13.118v.764a1 1 0 01-.447.842L15 17v-7zM4 6h16M4 10h10M4 14h6" />
      </svg>
      <h1 class="text-2xl font-bold gradient-text">View Tv <span class="text-white font-medium">| Moviepire</span></h1>
    </div>
    <div class="flex items-center space-x-4">
      <button id="refresh-btn" class="control-btn p-2 rounded-full hover:bg-sky-600/20 transition flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-sky-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
      </button>
      <a href="/" class="control-btn px-4 py-2 rounded-lg bg-sky-600/30 hover:bg-sky-600/40 text-sm font-medium text-sky-100 border border-sky-500/30 transition flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Home
      </a>
    </div>
  </header>

  <!-- Video Container -->
  <div id="video-container" class="flex-1 relative z-10">
    <iframe id="movie-frame" src="https://moviepire.net/" allowfullscreen class="w-full h-full border-none"></iframe>
    
    <!-- Controls -->
    <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex space-x-3">
      <button id="fullscreen-btn" class="control-btn px-4 py-2 rounded-lg bg-sky-600/70 hover:bg-sky-500/80 text-sm font-medium text-white flex items-center space-x-2 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
        </svg>
        <span>Fullscreen</span>
      </button>
      
      <a href="https://moviepire.net/" target="_blank" class="control-btn px-4 py-2 rounded-lg bg-gray-700/70 hover:bg-gray-600/80 text-sm font-medium text-white flex items-center space-x-2 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
        </svg>
        <span>Open Directly</span>
      </a>
    </div>
  </div>

  <!-- Fallback Message -->
  <div id="fallback" class="hidden absolute inset-0 z-20 flex flex-col items-center justify-center bg-gray-900/90 p-8 text-center">
    <div class="max-w-md bg-gray-800/90 rounded-xl p-8 border border-gray-700/50 shadow-xl animate-fadeIn">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-red-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
      <h2 class="text-xl font-bold text-gray-100 mb-2">Content Not Available</h2>
      <p class="text-gray-300 mb-6">This content cannot be embedded due to security restrictions.</p>
      <div class="flex justify-center space-x-3">
        <a href="https://moviepire.net/" target="_blank" class="px-4 py-2 rounded-lg bg-sky-600 hover:bg-sky-500 text-sm font-medium text-white flex items-center space-x-2 transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
          </svg>
          <span>Open Moviepire</span>
        </a>
        <button id="retry-btn" class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-medium text-white flex items-center space-x-2 transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          <span>Try Again</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const iframe = document.getElementById("movie-frame");
    const fallback = document.getElementById("fallback");
    const fullscreenBtn = document.getElementById("fullscreen-btn");
    const refreshBtn = document.getElementById("refresh-btn");
    const retryBtn = document.getElementById("retry-btn");

    // Check if iframe loaded successfully
    iframe.onload = () => {
      console.log("Iframe loaded successfully.");
      fallback.classList.add("hidden");
    };

    iframe.onerror = () => {
      document.getElementById("video-container").classList.add("hidden");
      fallback.classList.remove("hidden");
    };

    // Fullscreen functionality
    fullscreenBtn.onclick = () => {
      if (iframe.requestFullscreen) {
        iframe.requestFullscreen();
      } else if (iframe.webkitRequestFullscreen) {
        iframe.webkitRequestFullscreen();
      } else if (iframe.msRequestFullscreen) {
        iframe.msRequestFullscreen();
      }
    };

    // Refresh functionality
    refreshBtn.onclick = () => {
      iframe.src = iframe.src;
    };

    // Retry functionality
    retryBtn.onclick = () => {
      fallback.classList.add("hidden");
      document.getElementById("video-container").classList.remove("hidden");
      iframe.src = iframe.src;
    };

    // Add keyboard shortcut for fullscreen (F key)
    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'f') {
        fullscreenBtn.click();
      }
    });
  </script>
</body>
</html>
