<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <title>View Tv | Moviepire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    header {
      background: linear-gradient(90deg, #00f2fe, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2.5rem;
      font-weight: bold;
      text-align: center;
      padding: 20px;
      z-index: 2;
      position: relative;
    }

    iframe {
      width: 100%;
      height: calc(100% - 80px);
      border: none;
      position: absolute;
      top: 80px;
      left: 0;
    }

    @media (max-width: 768px) {
      header {
        font-size: 1.8rem;
        padding: 15px;
      }

      iframe {
        top: 70px;
        height: calc(100% - 70px);
      }
    }
  </style>
</head>
<body>
  <header>View Tv | Moviepire</header>
  <iframe 
    src="https://moviepire.net/" 
    allowfullscreen>
  </iframe>
</body>
</html>
