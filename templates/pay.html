<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VIP Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: linear-gradient(to right, #111, #1e1e1e);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        .container {
            background: #222;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #0f0;
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-top: 1rem;
            font-weight: bold;
        }
        .phone-prefix {
            display: flex;
            align-items: center;
            background: #333;
            border: 1px solid #444;
            border-radius: 8px;
            overflow: hidden;
        }
        .phone-prefix span {
            padding: 0.7rem 0.9rem;
            background: #0f0;
            color: #000;
            font-weight: bold;
        }
        .phone-prefix input {
            flex: 1;
            padding: 0.7rem;
            border: none;
            outline: none;
            background: #111;
            color: #fff;
        }
        input[type="number"] {
            width: 100%;
            padding: 0.7rem;
            background: #111;
            color: #fff;
            border: 1px solid #444;
            border-radius: 8px;
            margin-top: 0.5rem;
        }
        button {
            margin-top: 1.5rem;
            width: 100%;
            padding: 0.8rem;
            background: #0f0;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #0c0;
        }
        .message {
            text-align: center;
            margin-bottom: 1rem;
            padding: 0.7rem;
            border-radius: 8px;
        }
        .success { background: #063; color: #bff; }
        .error { background: #600; color: #fbb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Become a VIP</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="message {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form id="paymentForm" method="POST">
        {{ csrf_token() }}

        <label for="phone">Phone Number</label>
        <div class="phone-prefix">
            <span>+254</span>
            <input type="text" id="phone" name="phone" pattern="[17][0-9]{8}" maxlength="9" required placeholder="712345678">
        </div>

        <label for="amount">Amount (KES)</label>
        <input type="number" id="amount" name="amount" min="1" value="10" required>

        <button type="submit">Pay Now</button>
    </form>
</div>

<script>
document.getElementById("paymentForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const phoneInput = document.getElementById("phone");
    const amountInput = document.getElementById("amount");
    const phone = phoneInput.value.trim();
    const amount = amountInput.value.trim();

    if (!/^[17][0-9]{8}$/.test(phone)) {
        alert("Enter a valid Safaricom number (starting with 7 or 1, 9 digits).");
        return;
    }

    const fullPhone = "254" + phone;

    const res = await fetch("/api/pay", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ phone: fullPhone, amount: amount })
    });

    const result = await res.json();

    if (result.success) {
        alert("STK Push sent. Check your phone.");
    } else {
        alert("Error: " + result.message);
    }
});
</script>

</body>
</html>
