<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #0f0f1a;
            color: #f0f0f0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .pay-container {
            background: #1a1a2e;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 0 12px rgba(0, 255, 150, 0.3);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #00ffcc;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            margin-top: 1rem;
            font-weight: 500;
        }
        .input-group {
            display: flex;
        }
        .input-prefix {
            padding: 0.7rem;
            background: #2b2b3d;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            color: #00ffcc;
            font-weight: bold;
            border: none;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 0.7rem;
            border: none;
            border-radius: 10px;
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
            background: #2b2b3d;
            color: #fff;
            font-size: 1rem;
        }
        button {
            margin-top: 1.5rem;
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00ffcc, #00b894);
            color: #000;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: linear-gradient(90deg, #00b894, #00ffcc);
        }
        .msg {
            margin-top: 1rem;
            text-align: center;
            font-weight: 500;
        }
        .loading {
            text-align: center;
            color: #ffcc00;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="pay-container">
    <h2>Pay with M-Pesa</h2>
    <form id="payment-form" method="POST">
        {{ csrf_token() }}

        <label for="phone">Phone Number (Starts with 7 or 1)</label>
        <div class="input-group">
            <span class="input-prefix">+254</span>
            <input type="text" id="phone" name="phone" placeholder="712345678" required pattern="^(7|1)\d{8}$">
        </div>

        <label for="amount">Amount (KES)</label>
        <input type="number" id="amount" name="amount" min="1" required>

        <button type="submit">Pay Now</button>
        <div class="loading" id="loading" style="display: none;">Processing...</div>
        <div class="msg" id="msg"></div>
    </form>
</div>

<script>
    const form = document.getElementById('payment-form');
    const loading = document.getElementById('loading');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        loading.style.display = 'block';
        msg.textContent = '';

        const rawPhone = document.getElementById('phone').value.trim();
        const amount = document.getElementById('amount').value;

        // Validate phone format again in JS
        if (!/^(7|1)\d{8}$/.test(rawPhone)) {
            loading.style.display = 'none';
            msg.style.color = 'red';
            msg.textContent = 'Phone must start with 7 or 1 and be 9 digits.';
            return;
        }

        const fullPhone = "+254" + rawPhone;

        try {
            const response = await fetch('/api/pay', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token()|safe }}'
                },
                body: JSON.stringify({ phone: fullPhone, amount })
            });

            const result = await response.json();
            loading.style.display = 'none';

            if (result.success) {
                msg.style.color = '#00ffcc';
                msg.textContent = 'STK Push sent. Complete payment on your phone.';
            } else {
                msg.style.color = 'red';
                msg.textContent = 'Payment failed: ' + (result.message || 'Try again.');
            }
        } catch (err) {
            loading.style.display = 'none';
            msg.style.color = 'red';
            msg.textContent = 'Error occurred. Check your connection.';
        }
    });
</script>

</body>
</html>
