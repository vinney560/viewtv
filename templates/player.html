<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ channel_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    /* Reset & base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 10px;
    }

    /* Back button */
    .back-btn {
      margin-bottom: 12px;
    }

    .back-btn a {
      color: #58a6ff;
      font-weight: bold;
      text-decoration: none;
      font-size: 1em;
      cursor: pointer;
      user-select: none;
      transition: color 0.3s ease;
    }

    .back-btn a:hover {
      color: #00e1ff;
    }

    /* Channel list */
    .channel-list {
      background-color: #111;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 16px;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
      scrollbar-color: #00e1ff #111;
    }

    .channel-list::-webkit-scrollbar {
      height: 6px;
    }

    .channel-list::-webkit-scrollbar-track {
      background: #111;
    }

    .channel-list::-webkit-scrollbar-thumb {
      background-color: #00e1ff;
      border-radius: 8px;
    }

    .channel-list a {
      display: inline-block;
      padding: 8px 14px;
      margin-right: 8px;
      border-radius: 6px;
      text-decoration: none;
      color: #c9d1d9;
      font-weight: normal;
      transition: background-color 0.3s, color 0.3s;
    }

    .channel-list a.active {
      color: #00e1ff;
      background-color: #003344;
      font-weight: bold;
    }

    .channel-list a:hover:not(.active) {
      background-color: #222;
      color: #58a6ff;
    }

    /* Player container */
    .player-container {
      text-align: center;
    }

    .video-title {
      margin-bottom: 12px;
      font-size: 1.2em;
      color: #00e1ff;
    }

    video, iframe {
      width: 100%;
      max-width: 100%;
      height: auto;
      max-height: 75vh;
      border-radius: 8px;
      background-color: #000;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="javascript:void(0)"
       onclick="tryClose()" 
       class="fixed top-4 left-4 flex items-center text-blue-400 hover:text-blue-300 transition duration-200 z-50">
        <svg xmlns="http://www.w3.org/2000/svg" 
           fill="none" 
           viewBox="0 0 24 24" 
           stroke-width="2" 
           stroke="currentColor" 
           class="w-6 h-6 mr-1">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
      <span class="text-base font-medium">Back</span>
    </a>

    <!-- Channel List -->
    <div class="channel-list">
      {% for key, ch in channels.items() %}
        <a href="{{ url_for('play_channel', key=key) }}" 
           class="{% if key == current_key %}active{% endif %}">
          {{ ch.name }}
        </a>
      {% endfor %}
    </div>

    <!-- Player -->
    <div class="player-container">
      <div class="video-title">{{ channel_name }}</div>
      <div id="player-area">
        <video id="video" controls autoplay playsinline></video>
      </div>
    </div>
  </div>

  <script>
    const streamUrl = "{{ stream_url }}";
    const video = document.getElementById('video');
    const playerArea = document.getElementById('player-area');

    function createIframe(url) {
      const iframe = document.createElement("iframe");
      iframe.src = url;
      iframe.allow = "autoplay; fullscreen";
      iframe.allowFullscreen = true;
      iframe.style.width = "100%";
      iframe.style.height = "70vh";
      iframe.style.border = "none";
      return iframe;
    }

    if (streamUrl.includes("youtube.com")) {
      const embedUrl = streamUrl.includes("embed")
        ? streamUrl
        : streamUrl.replace("watch?v=", "embed/") + "?autoplay=1";
      playerArea.innerHTML = '';
      playerArea.appendChild(createIframe(embedUrl));
    } else if (
      streamUrl.includes("dailymotion.com") ||
      streamUrl.includes("kenyalivetv.co.ke")
    ) {
      playerArea.innerHTML = '';
      playerArea.appendChild(createIframe(streamUrl));
    } else if (streamUrl.endsWith(".m3u8")) {
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play();
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = streamUrl;
        video.addEventListener("loadedmetadata", () => {
          video.play();
        });
      } else {
        playerArea.innerHTML = "<p>Sorry, your browser doesn’t support HLS playback.</p>";
      }
    } else {
      video.src = streamUrl;
    }
    function tryClose() {
      window.close();
      setTimeout(() => {
        if (!window.closed) {
          history.back();
        }
      }, 200);
    }    
  </script>
</body>
</html>
