<!-- templates/player.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ channel_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Include hls.js so that .m3u8 works in modern browsers -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .player-container {
      width: 90%;
      max-width: 900px;
      text-align: center;
    }
    .video-title {
      margin-bottom: 12px;
      font-size: 1.2em;
      color: #00e1ff;
    }
    video {
      width: 100%;
      height: auto;
      max-height: 80vh;
      border-radius: 8px;
      background-color: #000;
      outline: none;
    }
  </style>
</head>
<body>
  <div class="player-container">
    <div class="video-title">{{ channel_name }}</div>
    <video id="video" controls autoplay playsinline></video>
  </div>

  <script>
    const video = document.getElementById('video');
    const streamUrl = "{{ stream_url }}";

    // If it's a YouTube URL, embed in an <iframe> instead:
    if (streamUrl.includes("youtube.com")) {
      const iframe = document.createElement("iframe");
      iframe.src = streamUrl.replace("watch?v=", "embed/") + "?autoplay=1&mute=0";
      iframe.allow = "autoplay; fullscreen";
      iframe.style = "width:100%; height:80vh; border:none;";
      document.querySelector(".player-container").replaceChild(iframe, video);
    } else {
      // HLS.js for .m3u8 files
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play();
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = streamUrl;
        video.addEventListener("loadedmetadata", function () {
          video.play();
        });
      } else {
        alert("Sorry, your browser doesn’t support HLS playback.");
      }
    }
  </script>
</body>
</html>
