<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ channel_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- hls.js for HLS streaming -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .player-container {
      width: 90%;
      max-width: 900px;
      text-align: center;
    }
    .video-title {
      margin-bottom: 12px;
      font-size: 1.2em;
      color: #00e1ff;
    }
    video, iframe {
      width: 100%;
      height: auto;
      max-height: 80vh;
      border-radius: 8px;
      background-color: #000;
      outline: none;
    }
  </style>
</head>
<body>
  <div class="player-container">
    <div class="video-title">{{ channel_name }}</div>
    <div id="player-area">
      <video id="video" controls autoplay playsinline></video>
    </div>
  </div>

  <script>
    const streamUrl = "{{ stream_url }}";
    const video = document.getElementById('video');
    const playerArea = document.getElementById('player-area');

    function createIframe(url) {
      const iframe = document.createElement("iframe");
      iframe.src = url;
      iframe.allow = "autoplay; fullscreen";
      iframe.allowFullscreen = true;
      iframe.style.width = "100%";
      iframe.style.height = "80vh";
      iframe.style.border = "none";
      return iframe;
    }

    // Handle YouTube
    if (streamUrl.includes("youtube.com")) {
      const embedUrl = streamUrl.includes("embed")
        ? streamUrl
        : streamUrl.replace("watch?v=", "embed/") + "?autoplay=1";
      playerArea.innerHTML = '';
      playerArea.appendChild(createIframe(embedUrl));
    }

    // Handle Dailymotion
    else if (streamUrl.includes("dailymotion.com")) {
      playerArea.innerHTML = '';
      playerArea.appendChild(createIframe(streamUrl));
    }

    // Handle .m3u8 streams with hls.js
    else if (streamUrl.endsWith(".m3u8")) {
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play();
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = streamUrl;
        video.addEventListener("loadedmetadata", () => {
          video.play();
        });
      } else {
        playerArea.innerHTML = "<p>Sorry, your browser doesn’t support HLS playback.</p>";
      }
    }

    // Fallback: Try to play it anyway
    else {
      video.src = streamUrl;
    }
  </script>
</body>
</html>
