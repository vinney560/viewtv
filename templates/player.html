<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ channel_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- hls.js for HLS streaming -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 0 10px;
      margin-top: 20px;
      box-sizing: border-box;
    }

    /* Back button */
    .back-btn {
      margin-bottom: 12px;
    }
    .back-btn a {
      color: #58a6ff;
      font-weight: bold;
      text-decoration: none;
      font-size: 1em;
      cursor: pointer;
      user-select: none;
      transition: color 0.3s ease;
    }
    .back-btn a:hover {
      color: #00e1ff;
    }

    /* Channel list */
    .channel-list {
      background-color: #111;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 16px;
      overflow-x: auto;
      white-space: nowrap;
    }
    .channel-list a {
      display: inline-block;
      padding: 8px 14px;
      margin-right: 8px;
      border-radius: 6px;
      text-decoration: none;
      color: #c9d1d9;
      font-weight: normal;
      transition: background-color 0.3s, color 0.3s;
    }
    .channel-list a.active {
      color: #00e1ff;
      background-color: #003344;
      font-weight: bold;
    }
    .channel-list a:hover:not(.active) {
      background-color: #222;
      color: #58a6ff;
    }

    /* Player container */
    .player-container {
      text-align: center;
    }

    .video-title {
      margin-bottom: 12px;
      font-size: 1.2em;
      color: #00e1ff;
    }

    video, iframe {
      width: 100%;
      max-width: 100%;
      height: auto;
      max-height: 75vh;
      border-radius: 8px;
      background-color: #000;
      outline: none;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Back Button -->
    <div class="back-btn">
      <a href="javascript:history.back()">← Back</a>
    </div>

    <!-- Channel List -->
    <div class="channel-list">
      {% for key, ch in channels.items() %}
        <a href="{{ url_for('play_channel', key=key) }}" 
           class="{% if key == current_key %}active{% endif %}">
          {{ ch.name }}
        </a>
      {% endfor %}
    </div>

    <!-- Player -->
    <div class="player-container">
      <div class="video-title">{{ channel_name }}</div>
      <div id="player-area">
        <video id="video" controls autoplay playsinline></video>
      </div>
    </div>
  </div>

  <script>
    const streamUrl = "{{ stream_url }}";
    const video = document.getElementById('video');
    const playerArea = document.getElementById('player-area');
 
    function createIframe(url) {
      const iframe = document.createElement("iframe");
      iframe.src = url;
      iframe.allow = "autoplay; fullscreen";
      iframe.allowFullscreen = true;
      iframe.style.width = "100%";
      iframe.style.height = "70vh";
      iframe.style.border = "none";
      return iframe;
    }

    if (streamUrl.includes("youtube.com")) {
      const embedUrl = streamUrl.includes("embed")
        ? streamUrl
        : streamUrl.replace("watch?v=", "embed/") + "?autoplay=1";
      playerArea.innerHTML = '';
      playerArea.appendChild(createIframe(embedUrl));
    } else if (
      streamUrl.includes("dailymotion.com") ||
      streamUrl.includes("kenyalivetv.co.ke")
    ) {
      // For Dailymotion and KenyaLiveTV (iframe sources)
      playerArea.innerHTML = '';
      playerArea.appendChild(createIframe(streamUrl));
    } else if (streamUrl.endsWith(".m3u8")) {
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play();
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = streamUrl;
        video.addEventListener("loadedmetadata", () => {
          video.play();
        });
      } else {
        playerArea.innerHTML = "<p>Sorry, your browser doesn’t support HLS playback.</p>";
      }
    } else {
      video.src = streamUrl;
    }
  </script>
</body>
</html>
