<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Plus | View Tv Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6">

  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold text-cyan-400 mb-6">Manage Plus Access</h1>

    <div class="overflow-x-auto rounded-lg shadow border border-gray-700 bg-gray-800">
      <table class="min-w-full divide-y divide-gray-700">
        <thead class="bg-gray-700 text-cyan-300 text-sm">
          <tr>
            <th class="px-4 py-3 text-left">#</th>
            <th class="px-4 py-3 text-left">User</th>
            <th class="px-4 py-3 text-left">Expires At</th>
            <th class="px-4 py-3 text-left">Type</th>
            <th class="px-4 py-3 text-center">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-800 text-sm">
          {% for user in users %}
          <tr class="hover:bg-gray-700">
            <td class="px-4 py-2">{{ loop.index }}</td>
            <td class="px-4 py-2">{{ user.email }}</td>
            <td class="px-4 py-2">
              {% if user.plus_expires_at %}
                {{ user.plus_expires_at.strftime('%Y-%m-%d %H:%M:%S') }}
              {% else %}
                N/A
              {% endif %}
            </td>
            <td class="px-4 py-2 capitalize">{{ user.plus_type or 'N/A' }}</td>
            <td class="px-4 py-2 text-center">
              <div class="flex items-center justify-center space-x-2">
                <!-- Modify Form -->
                <form method="POST" action="{{ url_for('update_plus', user_id=user.id) }}" class="flex space-x-1">
                  <input type="number" name="hours" min="0" placeholder="h"
                         class="w-12 px-2 py-1 bg-gray-700 text-white border border-gray-600 rounded text-xs" />
                  <input type="number" name="minutes" min="0" max="59" placeholder="m"
                         class="w-12 px-2 py-1 bg-gray-700 text-white border border-gray-600 rounded text-xs" />
                  <input type="number" name="seconds" min="0" max="59" placeholder="s"
                         class="w-12 px-2 py-1 bg-gray-700 text-white border border-gray-600 rounded text-xs" />
                  <button type="submit"
                          class="bg-blue-600 hover:bg-blue-500 text-white px-2 py-1 rounded text-xs">
                    Update
                  </button>
                </form>

                <!-- Delete Form with Confirm -->
                <form method="POST" action="{{ url_for('delete_plus', user_id=user.id) }}"
                      onsubmit="return confirm('Are you sure you want to revoke Plus for this user?');">
                  <button type="submit"
                          class="bg-red-600 hover:bg-red-500 text-white px-2 py-1 rounded text-xs">
                    Delete
                  </button>
                </form>
              </div>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

</body>
</html>
