<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Player | View Tv</title>
  <script src="https://cdn.tailwindcss.com"></script>  <!-- hls.js for HLS playback -->  
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>  <!-- dash.js for DASH playback -->  
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>  <!-- video.js CSS & JS -->  
  <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
  <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>  
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background-color: #000;
      color: white;
    }
    #player-container {
      position: relative;
      width: 100%;
      max-width: 1600px;
      aspect-ratio: 16 / 9;
      margin: auto;
      background: black;
      border-radius: 0.5rem;
    }
    #player, #iframe-player {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border-radius: 0.5rem;
      background: black;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 640px) {
      #player-container {
        aspect-ratio: 4 / 3;
      }
    }

    /* Fullscreen styles to stretch container to full screen */
    :fullscreen #player-container,
    :-webkit-full-screen #player-container {
      width: 100vw !important;
      height: 100vh !important;
      max-width: none !important;
      aspect-ratio: unset !important;
      border-radius: 0 !important;
    }

    /* Fullscreen toggle button styles */
    #fullscreen-toggle, #data-saver-toggle {
      background: transparent;
      border: none;
      cursor: pointer;
      transition: opacity 0.3s ease;
      outline: none;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #22d3ee; /* Tailwind cyan-400 */
    }
    #fullscreen-toggle:hover, #data-saver-toggle:hover {
      color: #ffffff;
    }

    /* Auto-hide logic - hidden by adding 'hide' class */
    #fullscreen-toggle.hide, #data-saver-toggle.hide {
      opacity: 0;
      pointer-events: none;
    }
    
    /* Data saver active state */
    #data-saver-toggle.active {
      color: #ffffff;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen bg-black text-white">

  <header class="flex items-center justify-between px-4 py-4 border-b border-gray-700 text-base sm:text-lg md:text-xl">
    <button onclick="tryClose()" class="text-cyan-400 hover:text-white flex items-center space-x-2">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
      </svg>
      <span>Back</span>
    </button>
    <h1 class="font-bold text-cyan-400">Now Streaming</h1>
    <div class="flex space-x-4">
      <!-- Data Saver Toggle Button -->
      <button id="data-saver-toggle" title="Toggle Data Saver" aria-label="Toggle data saver">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
        </svg>
      </button>
      <!-- Fullscreen Toggle Button -->
      <button id="fullscreen-toggle" title="Toggle Fullscreen" aria-label="Toggle fullscreen">
        <svg id="fullscreen-icon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 4h6M4 4v6M20 4h-6M20 4v6M4 20h6M4 20v-6M20 20h-6M20 20v-6" />
        </svg>
      </button>
    </div>
  </header>

  <main class="flex-grow flex flex-col items-center justify-center p-4">
    <div id="player-container">
      <video
        id="player"
        class="video-js vjs-default-skin"
        controls
        preload="auto"
        muted
        playsinline
        webkit-playsinline
      ></video>
      <iframe id="iframe-player" class="hidden" frameborder="0" allowfullscreen sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>
    </div>
    <p id="error-message" class="mt-4 text-red-500 hidden text-sm sm:text-base"></p>
  </main>

  <footer class="text-center text-gray-500 text-sm py-4">
    &copy; <span id="year"></span> View Tv. All rights reserved.
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    function getExtension(url) {
      const path = url.split('?')[0].split('#')[0];
      const extMatch = path.match(/\.(mp4|m3u8|mpd|webm|mov|avi|mkv)$/i);
      return extMatch ? extMatch[1].toLowerCase() : '';
    }

    // Data saver state and functions
    let isDataSaverEnabled = false;
    let originalQuality = null;
    const player = document.getElementById('player');
    
    function toggleDataSaver() {
      isDataSaverEnabled = !isDataSaverEnabled;
      const dataSaverBtn = document.getElementById('data-saver-toggle');
      
      if (isDataSaverEnabled) {
        dataSaverBtn.classList.add('active');
        enableDataSaver();
      } else {
        dataSaverBtn.classList.remove('active');
        disableDataSaver();
      }
    }
    
    function enableDataSaver() {
      // For HLS streams
      if (window.hls) {
        window.hls.currentLevel = -1; // Auto quality based on bandwidth
        window.hls.config.maxMaxBufferLength = 30; // Reduce buffer size
        window.hls.config.maxBufferSize = 6000000; // 6MB buffer
        window.hls.config.maxBufferLength = 30; // 30 seconds buffer
      }
      
      // For DASH streams
      if (window.dashPlayer) {
        window.dashPlayer.updateSettings({
          streaming: {
            buffer: {
              bufferTimeAtTopQuality: 30,
              bufferTimeAtTopQualityLongForm: 30,
              bufferAheadToKeep: 30,
              bufferBehindToKeep: 30,
              initialBufferLevel: 30
            }
          }
        });
        window.dashPlayer.setQualityFor('video', 'auto');
      }
      
      // For regular video elements
      if (player.src && !window.hls && !window.dashPlayer) {
        player.playbackRate = 0.9; // Slightly reduce playback speed
      }
    }
    
    function disableDataSaver() {
      // For HLS streams
      if (window.hls) {
        window.hls.currentLevel = originalQuality;
        window.hls.config.maxMaxBufferLength = 600;
        window.hls.config.maxBufferSize = 60000000;
        window.hls.config.maxBufferLength = 600;
      }
      
      // For DASH streams
      if (window.dashPlayer) {
        window.dashPlayer.updateSettings({
          streaming: {
            buffer: {
              bufferTimeAtTopQuality: 600,
              bufferTimeAtTopQualityLongForm: 600,
              bufferAheadToKeep: 600,
              bufferBehindToKeep: 600,
              initialBufferLevel: 600
            }
          }
        });
      }
      
      // For regular video elements
      if (player.src && !window.hls && !window.dashPlayer) {
        player.playbackRate = 1.0;
      }
    }

    (function() {
      const streamUrl = getQueryParam('url');
      const token = getQueryParam('token');
      if (!streamUrl) {
        showError("No stream URL provided");
        return;
      }

      const urlWithToken = token ? `${streamUrl}${streamUrl.includes('?') ? '&' : '?'}token=${encodeURIComponent(token)}` : streamUrl;
      const ext = getExtension(urlWithToken);

      const iframe = document.getElementById('iframe-player');
      const errorMsg = document.getElementById('error-message');

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.remove('hidden');
      }

      errorMsg.classList.add('hidden');
      player.style.display = 'none';
      iframe.style.display = 'none';

      if (ext === 'm3u8') {
        if (Hls.isSupported()) {
          const hls = new Hls({
            maxMaxBufferLength: 600,
            maxBufferSize: 60000000,
            maxBufferLength: 600
          });
          window.hls = hls; // Store for data saver
          originalQuality = hls.currentLevel;
          hls.loadSource(urlWithToken);
          hls.attachMedia(player);
          hls.on(Hls.Events.ERROR, function(event, data) {
            showError("Playback error: " + data.details);
          });
          player.style.display = 'block';
          player.muted = false;
          player.play();
        } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
          player.src = urlWithToken;
          player.style.display = 'block';
          player.play();
        } else {
          showError("HLS not supported on this browser");
        }
      } else if (ext === 'mpd') {
        try {
          const dashPlayer = dashjs.MediaPlayer().create();
          window.dashPlayer = dashPlayer; // Store for data saver
          dashPlayer.updateSettings({
            streaming: {
              buffer: {
                bufferTimeAtTopQuality: 600,
                bufferTimeAtTopQualityLongForm: 600,
                bufferAheadToKeep: 600,
                bufferBehindToKeep: 600,
                initialBufferLevel: 600
              }
            }
          });
          dashPlayer.initialize(player, urlWithToken, true);
          player.style.display = 'block';
        } catch(e) {
          showError("DASH playback error: " + e.message);
        }
      } else if (["mp4", "webm", "mov", "avi", "mkv"].includes(ext)) {
        player.src = urlWithToken;
        player.style.display = 'block';
        player.play().catch(() => {});
      } else {
        iframe.src = urlWithToken;
        iframe.style.display = 'block';
      }
    })();

    // Fullscreen toggle logic with icon switch and auto-hide
    (function() {
      const fullscreenBtn = document.getElementById('fullscreen-toggle');
      const dataSaverBtn = document.getElementById('data-saver-toggle');
      const fullscreenIcon = document.getElementById('fullscreen-icon');
      const playerContainer = document.getElementById('player-container');
      let hideTimeout;

      // SVG paths for icons
      const enterFullscreenPath = 'M4 4h6M4 4v6M20 4h-6M20 4v6M4 20h6M4 20v-6M20 20h-6M20 20v-6'; // square [ ]
      const exitFullscreenPath = 'M6 18L18 6M6 6l12 12'; // X icon

      function setIcon(isFullscreen) {
        fullscreenIcon.innerHTML = '';
        if (isFullscreen) {
          // X icon
          fullscreenIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${exitFullscreenPath}" />`;
        } else {
          // Square icon
          fullscreenIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${enterFullscreenPath}" />`;
        }
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          playerContainer.requestFullscreen().catch(err => {
            console.error(`Error attempting fullscreen: ${err.message}`);
          });
        } else {
          document.exitFullscreen();
        }
      }

      function resetHideTimeout() {
        fullscreenBtn.classList.remove('hide');
        dataSaverBtn.classList.remove('hide');
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => {
          fullscreenBtn.classList.add('hide');
          dataSaverBtn.classList.add('hide');
        }, 3000); // hide after 3 seconds of inactivity
      }

      fullscreenBtn.addEventListener('click', () => {
        toggleFullscreen();
      });
      
      dataSaverBtn.addEventListener('click', () => {
        toggleDataSaver();
        resetHideTimeout();
      });

      // Update icon on fullscreen change
      document.addEventListener('fullscreenchange', () => {
        setIcon(!!document.fullscreenElement);
        resetHideTimeout();
      });

      // Show button on any mousemove or touch, then reset hide timer
      document.addEventListener('mousemove', resetHideTimeout);
      document.addEventListener('touchstart', resetHideTimeout);

      // Initialize icon and start hide timer
      setIcon(!!document.fullscreenElement);
      resetHideTimeout();
    })();
    function tryClose() {
      window.close();
      setTimeout(() => {
        if (!window.closed) history.back();
      }, 300);
    }
  </script>
</body>
</html>
