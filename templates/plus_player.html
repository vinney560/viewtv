<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Player | View Tv</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
  <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
  <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background-color: #000;
      color: white;
    }
    #player-container {
      position: relative;
      width: 100%;
      max-width: 1600px;
      aspect-ratio: 16 / 9;
      margin: auto;
      background: black;
      border-radius: 0.5rem;
    }
    #player, #iframe-player {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border-radius: 0.5rem;
      background: black;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 640px) {
      #player-container {
        aspect-ratio: 4 / 3;
      }
    }
    :fullscreen #player-container,
    :-webkit-full-screen #player-container {
      width: 100vw !important;
      height: 100vh !important;
      max-width: none !important;
      aspect-ratio: unset !important;
      border-radius: 0 !important;
    }
    #fullscreen-toggle {
      background: transparent;
      border: none;
      cursor: pointer;
      transition: opacity 0.3s ease;
      outline: none;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #22d3ee;
    }
    #fullscreen-toggle:hover {
      color: #ffffff;
    }
    #fullscreen-toggle.hide {
      opacity: 0;
      pointer-events: none;
    }
    #ffmpeg-status {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      color: #22d3ee;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen bg-black text-white">

  <header class="flex items-center justify-between px-4 py-4 border-b border-gray-700 text-base sm:text-lg md:text-xl">
    <button onclick="tryClose()" class="text-cyan-400 hover:text-white flex items-center space-x-2">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
      </svg>
      <span>Back</span>
    </button>
    <h1 class="font-bold text-cyan-400">Now Streaming</h1>
    <button id="fullscreen-toggle" title="Toggle Fullscreen" aria-label="Toggle fullscreen">
      <svg id="fullscreen-icon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M4 4h6M4 4v6M20 4h-6M20 4v6M4 20h6M4 20v-6M20 20h-6M20 20v-6" />
      </svg>
    </button>
  </header>

  <main class="flex-grow flex flex-col items-center justify-center p-4">
    <div id="player-container">
      <video
        id="player"
        class="video-js vjs-default-skin"
        controls
        preload="auto"
        muted
        playsinline
        webkit-playsinline
      ></video>
      <iframe id="iframe-player" class="hidden" frameborder="0" allowfullscreen sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>
      <div id="ffmpeg-status" class="hidden">Using FFmpeg Proxy</div>
    </div>
    <p id="error-message" class="mt-4 text-red-500 hidden text-sm sm:text-base"></p>
  </main>

  <footer class="text-center text-gray-500 text-sm py-4">
    &copy; <span id="year"></span> View Tv. All rights reserved.
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    // Configuration
    const FFMPEG_PROXY_URL = "https://viewtv-p2s3.onrender.com/hls";
    const AUTO_FFMPEG_FOR_TS = true; // Set to false to disable auto-FFmpeg

    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    function getExtension(url) {
      const path = url.split('?')[0].split('#')[0];
      const extMatch = path.match(/\.(mp4|m3u8|mpd|webm|mov|avi|mkv|ts)$/i);
      return extMatch ? extMatch[1].toLowerCase() : '';
    }

    function showError(msg) {
      const errorMsg = document.getElementById('error-message');
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
    }

    function updateFFmpegStatus(show) {
      const status = document.getElementById('ffmpeg-status');
      if (show) {
        status.classList.remove('hidden');
      } else {
        status.classList.add('hidden');
      }
    }

    function playStream(url) {
      const player = document.getElementById('player');
      const iframe = document.getElementById('iframe-player');
      const errorMsg = document.getElementById('error-message');

      errorMsg.classList.add('hidden');
      player.style.display = 'none';
      iframe.style.display = 'none';

      const ext = getExtension(url);

      // Auto-convert TS to HLS via FFmpeg proxy
      if (ext === 'ts' && AUTO_FFMPEG_FOR_TS) {
        updateFFmpegStatus(true);
        const channelId = url.split('/').pop().replace('.ts', '');
        const proxyUrl = `${FFMPEG_PROXY_URL}/${channelId}.m3u8`;
        playHLS(proxyUrl);
        return;
      }

      updateFFmpegStatus(false);
      
      if (ext === 'm3u8') {
        playHLS(url);
      } else if (ext === 'mpd') {
        playDASH(url);
      } else if (["mp4", "webm", "mov", "avi", "mkv"].includes(ext)) {
        playDirect(url);
      } else if (ext === 'ts') {
        // Fallback for TS when AUTO_FFMPEG_FOR_TS is false
        playDirect(url);
      } else {
        playIFrame(url);
      }
    }

    function playHLS(url) {
      const player = document.getElementById('player');
      
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(player);
        hls.on(Hls.Events.ERROR, function(event, data) {
          if (data.fatal) {
            showError("HLS playback error: " + data.details);
          }
        });
        player.style.display = 'block';
        player.muted = false;
        player.play().catch(e => showError("Playback failed: " + e.message));
      } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
        player.src = url;
        player.style.display = 'block';
        player.play().catch(e => showError("Playback failed: " + e.message));
      } else {
        showError("HLS not supported on this browser");
      }
    }

    function playDASH(url) {
      const player = document.getElementById('player');
      try {
        const dashPlayer = dashjs.MediaPlayer().create();
        dashPlayer.initialize(player, url, true);
        player.style.display = 'block';
        player.play().catch(e => showError("Playback failed: " + e.message));
      } catch(e) {
        showError("DASH playback error: " + e.message);
      }
    }

    function playDirect(url) {
      const player = document.getElementById('player');
      player.src = url;
      player.style.display = 'block';
      player.play().catch(e => showError("Playback failed: " + e.message));
    }

    function playIFrame(url) {
      const iframe = document.getElementById('iframe-player');
      iframe.src = url;
      iframe.style.display = 'block';
    }

    // Initialize player
    (function() {
      const streamUrl = getQueryParam('url');
      const token = getQueryParam('token');
      if (!streamUrl) {
        showError("No stream URL provided");
        return;
      }

      const urlWithToken = token ? `${streamUrl}${streamUrl.includes('?') ? '&' : '?'}token=${encodeURIComponent(token)}` : streamUrl;
      playStream(urlWithToken);
    })();

    // Fullscreen toggle logic
    (function() {
      const fullscreenBtn = document.getElementById('fullscreen-toggle');
      const fullscreenIcon = document.getElementById('fullscreen-icon');
      const playerContainer = document.getElementById('player-container');
      let hideTimeout;

      const enterFullscreenPath = 'M4 4h6M4 4v6M20 4h-6M20 4v6M4 20h6M4 20v-6M20 20h-6M20 20v-6';
      const exitFullscreenPath = 'M6 18L18 6M6 6l12 12';

      function setIcon(isFullscreen) {
        fullscreenIcon.innerHTML = '';
        if (isFullscreen) {
          fullscreenIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${exitFullscreenPath}" />`;
        } else {
          fullscreenIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${enterFullscreenPath}" />`;
        }
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          playerContainer.requestFullscreen().catch(err => {
            console.error(`Error attempting fullscreen: ${err.message}`);
          });
        } else {
          document.exitFullscreen();
        }
      }

      function resetHideTimeout() {
        fullscreenBtn.classList.remove('hide');
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => {
          fullscreenBtn.classList.add('hide');
        }, 3000);
      }

      fullscreenBtn.addEventListener('click', toggleFullscreen);
      document.addEventListener('fullscreenchange', () => {
        setIcon(!!document.fullscreenElement);
        resetHideTimeout();
      });
      document.addEventListener('mousemove', resetHideTimeout);
      document.addEventListener('touchstart', resetHideTimeout);

      setIcon(!!document.fullscreenElement);
      resetHideTimeout();
    })();

    function tryClose() {
      window.close();
      setTimeout(() => {
        if (!window.closed) history.back();
      }, 300);
    }
  </script>
</body>
</html>
