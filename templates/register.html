<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>REGISTER</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
  <section class="container mx-auto px-6 py-20">
    <div class="bg-cyan-600 p-8 rounded-2xl shadow-xl max-w-md mx-auto">
      <h4 class="font-extrabold text-3xl text-center mb-6">Register</h4>
      <form action="/register" method="POST" class="space-y-4">
        <div>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <input class="bg-gray-600 w-full rounded-xl px-4 py-2 text-white font-bold" type="tel" placeholder="07xxxxxxx OR 01xxxxxxxx" name="mobile" required pattern="[0][0-9]{9}">
        </div>
        <div>
          <div class="relative">
            <input id="password" class="bg-gray-600 w-full rounded-xl px-4 py-2 text-white font-bold pr-12" type="password" placeholder="Password" name="password" required minlength="4">
            <button type="button" onclick="togglePassword('password', 'eyeIcon')" class="absolute top-1/2 right-3 -translate-y-1/2">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 
                     9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>
        <div>
          <div class="relative">
            <input id="confirm_password" class="bg-gray-600 w-full rounded-xl px-4 py-2 text-white font-bold pr-12" type="password" placeholder="Confirm Password" name="confirm_password" required minlength="4">
            <button type="button" onclick="togglePassword('confirm_password', 'eyeIcon2')" class="absolute top-1/2 right-3 -translate-y-1/2">
              <svg id="eyeIcon2" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 
                     9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>        
        <button type="submit" class="w-full bg-green-800 text-white py-2 rounded-xl mt-4 hover:bg-black transition">
          Register
        </button>
      </form>
    </div>
  </section>

  <script>
    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      const isHidden = input.type === "password";

      input.type = isHidden ? "text" : "password";
      icon.innerHTML = isHidden
        ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7
                 a9.965 9.965 0 012.181-3.316M6.8 6.8A9.956 9.956 0 0112 5
                 c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-4.106 5.154
                 M15 12a3 3 0 11-6 0 3 3 0 016 0zM3 3l18 18"/>`
        : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 
                 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7
                 -4.477 0-8.268-2.943-9.542-7z" />`;
    }
  </script>
</body>
</html>
